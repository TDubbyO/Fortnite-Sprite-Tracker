<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Collection</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        @keyframes chestShake {
            0%, 100% { transform: translate(-50%, -50%) translateX(0) rotate(0deg); }
            20% { transform: translate(-50%, -50%) translateX(-6px) rotate(-3deg); }
            40% { transform: translate(-50%, -50%) translateX(6px) rotate(3deg); }
            60% { transform: translate(-50%, -50%) translateX(-4px) rotate(-2deg); }
            80% { transform: translate(-50%, -50%) translateX(4px) rotate(2deg); }
        }
        @keyframes lidOpen {
            from { transform: rotate(0deg); }
            to { transform: rotate(-108deg); }
        }
        @keyframes burstFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
            35% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.9); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(24px) scale(0.5); }
            60% { opacity: 1; transform: translateY(-8px) scale(1.08); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes popInCentered {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(24px) scale(0.5); }
            60% { opacity: 1; transform: translate(-50%, -50%) translateY(-8px) scale(1.08); }
            100% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
        }
        @keyframes sparkleFloat {
            0% { opacity: 0; transform: rotate(var(--rot, 0deg)) translate(36px) scale(0.3); }
            30% { opacity: 0.8; }
            100% { opacity: 0; transform: rotate(var(--rot, 0deg)) translate(66px) scale(1); }
        }
        @keyframes roam {
            0% { left: var(--x0); top: var(--y0); }
            25% { left: var(--x1); top: var(--y1); }
            50% { left: var(--x2); top: var(--y2); }
            75% { left: var(--x3); top: var(--y3); }
            100% { left: var(--x0); top: var(--y0); }
        }
        @keyframes shuffleBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body style="margin:0; padding:0; -webkit-user-select: none; user-select: none;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const sprites = [
            { name: 'Water', color: '#3b82f6', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Earth', color: '#16a34a', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fire', color: '#ef4444', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Duck', color: '#facc15', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Ghost', color: '#cbd5e1', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Dream', color: '#a855f7', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Demon', color: '#b91c1c', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Punk', color: '#db2777', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'King', color: '#b45309', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Burnt Peanut', color: '#78350f', v: ['Base'] },
            { name: 'Zero Point', color: '#6d28d9', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fishy', color: '#f97316', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Striker', color: '#000000', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Aura', color: '#ffffff', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Boss', color: '#dc2626', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Grim', color: '#312e81', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
        ];

        const getImagePath = (spriteName, variant) => {
            const nameMap = {
                'Water': 'Water', 'Earth': 'Earth', 'Fire': 'Fire', 'Duck': 'Duck',
                'Ghost': 'Ghost', 'Dream': 'Dream', 'Demon': 'Demon', 'Punk': 'Punk',
                'King': 'King', 'Burnt Peanut': 'Burntpeanut', 'Zero Point': 'Zeropoint',
                'Fishy': 'Fishy', 'Striker': 'Striker', 'Aura': 'Aura', 'Boss': 'Boss', 'Grim': 'Grim'
            };
            const mappedName = nameMap[spriteName];
            return `/images/${mappedName}-${variant.toLowerCase()}.webp`;
        };

        // Shared style/props to stop the native long-press image menu (context menu,
        // "save image", callout) from appearing on iOS/Android while still allowing
        // our own onPointerDown/onPointerUp long-press logic to run.
        // Sprite names never contain a hyphen, so the LAST hyphen always
        // separates the variant (Base/Gold/Gummy/Galaxy) from the name.
        // Update these two filenames if your uploaded chest images use different names.
        const CHEST_CLOSED = '/images/Chest-closed.png';
        const CHEST_OPEN = '/images/Chest-open.png';

        const splitId = (id) => {
            const idx = id.lastIndexOf('-');
            return { name: id.slice(0, idx), variant: id.slice(idx + 1) };
        };

        const noCalloutImgProps = {
            draggable: false,
            onDragStart: (e) => e.preventDefault(),
            onContextMenu: (e) => e.preventDefault(),
            style: {
                WebkitTouchCallout: 'none',
                WebkitUserSelect: 'none',
                userSelect: 'none',
                WebkitUserDrag: 'none',
                pointerEvents: 'none' // let the parent div own all touch/mouse handling
            }
        };

        const Pie = ({ col, tot, r, col_val, format }) => {
            const pct = tot > 0 ? (col / tot) * 100 : 0;
            const id = `m${Math.random().toString(36).substr(2, 9)}`;
            const displayText = format === 'fraction' ? `${col}/${tot}` : `${Math.round(pct)}%`;
            
            const rad = (pct * 360) / 100;
            const isLarge = pct > 50 ? 1 : 0;
            const x1 = r + 10 + r * Math.cos(-Math.PI / 2);
            const y1 = r + 10 + r * Math.sin(-Math.PI / 2);
            const x2 = r + 10 + r * Math.cos(-Math.PI / 2 + (rad * Math.PI) / 180);
            const y2 = r + 10 + r * Math.sin(-Math.PI / 2 + (rad * Math.PI) / 180);
            const pathData = `M ${r + 10} ${r + 10} L ${x1} ${y1} A ${r} ${r} 0 ${isLarge} 1 ${x2} ${y2} Z`;
            
            return (
                <svg width={r * 2 + 20} height={r * 2 + 20} viewBox={`0 0 ${r * 2 + 20} ${r * 2 + 20}`} style={{ maxWidth: '100%' }}>
                    <defs>
                        <mask id={id}>
                            <rect width={r * 2 + 20} height={r * 2 + 20} fill="black" />
                            <path d={pathData} fill="white" />
                        </mask>
                    </defs>
                    <circle cx={r + 10} cy={r + 10} r={r} fill={col_val} opacity="0.15" />
                    <path d={pathData} fill={col_val} />
                    <text x={r + 10} y={r + 16} textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill={col_val}>{displayText}</text>
                    <text x={r + 10} y={r + 16} textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill="white" mask={`url(#${id})`}>{displayText}</text>
                </svg>
            );
        };

        const MasterCollectorPopup = ({ onClose, onEnable }) => (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                <div style={{ background: 'linear-gradient(135deg, #1a0033, #330066)', padding: '3rem 2rem', borderRadius: '1rem', textAlign: 'center', maxWidth: '400px', border: '2px solid #a855f7' }}>
                    <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>✨</div>
                    <h2 style={{ color: '#a855f7', fontSize: '2rem', fontWeight: 900, margin: '1rem 0' }}>Master Collector!</h2>
                    <p style={{ color: '#e2e8f0', fontSize: '1rem', marginBottom: '2rem' }}>All 61 sprites mastered!</p>
                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center' }}>
                        <button onClick={onClose} style={{ padding: '0.75rem 1.5rem', background: 'rgba(255,255,255,0.2)', color: 'white', border: '1px solid #a855f7', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Later</button>
                        <button onClick={() => { onEnable(); onClose(); }} style={{ padding: '0.75rem 1.5rem', background: '#a855f7', color: 'white', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Activate ✨</button>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [collected, setCollected] = useState(() => JSON.parse(localStorage.getItem('c') || '[]'));
            const [viewportWidth, setViewportWidth] = useState(() => window.innerWidth);
            useEffect(() => {
                const onResize = () => setViewportWidth(window.innerWidth);
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);
            const shareColumns = viewportWidth >= 700 ? 6 : 4;
            const [mastered, setMastered] = useState(() => JSON.parse(localStorage.getItem('m') || '[]'));
            const [share, setShare] = useState(false);
            const [dark, setDark] = useState(() => JSON.parse(localStorage.getItem('t') || 'true'));
            const [masterCollectorSeen, setMasterCollectorSeen] = useState(() => JSON.parse(localStorage.getItem('mythic') || 'false'));
            const [showMasterCollectorPopup, setShowMasterCollectorPopup] = useState(false);
            const [masterCollectorActive, setMasterCollectorActive] = useState(() => JSON.parse(localStorage.getItem('mythicActive') || 'false'));
            const [roulette, setRoulette] = useState(false);
            const [roulettePhase, setRoulettePhase] = useState('idle'); // idle (roaming) | gather | shake | burst
            const [scatterItems, setScatterItems] = useState([]); // [{id, xPct, yPct, wp:[{x,y}x3], roamDuration, roamDelay, gatherDelay}]
            const [rouletteResult, setRouletteResult] = useState(null);
            const rouletteTimeoutRef = useRef(null);
            const [frozenPositions, setFrozenPositions] = useState({}); // id -> {x, y} snapshot taken at click time
            const stageRef = useRef(null);
            const rouletteItemRefs = useRef({});
            const longPressTimers = useRef({});
            const longPressFlag = useRef({});

            useEffect(() => { localStorage.setItem('c', JSON.stringify(collected)); }, [collected]);
            useEffect(() => { localStorage.setItem('m', JSON.stringify(mastered)); }, [mastered]);
            useEffect(() => { localStorage.setItem('t', JSON.stringify(dark)); }, [dark]);
            useEffect(() => { localStorage.setItem('mythic', JSON.stringify(masterCollectorSeen)); }, [masterCollectorSeen]);
            useEffect(() => { localStorage.setItem('mythicActive', JSON.stringify(masterCollectorActive)); }, [masterCollectorActive]);

            const tot = 61;
            const col = collected.length;
            const mas = mastered.length;
            const masterCollectorUnlocked = mas === tot && tot > 0;
            const isMasterCollector = masterCollectorUnlocked && masterCollectorActive;

            useEffect(() => {
                if (masterCollectorUnlocked && !masterCollectorSeen) {
                    setMasterCollectorSeen(true);
                    setShowMasterCollectorPopup(true);
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100, 50, 200]);
                    }
                }
            }, [masterCollectorUnlocked, masterCollectorSeen]);

            useEffect(() => {
                if (masterCollectorActive && mas < tot) {
                    setMasterCollectorActive(false);
                }
            }, [mas, tot, masterCollectorActive]);

            const CompositeImage = ({ spriteName, variants, collectedStatus, masteredStatus }) => {
                const variantColors = {
                    'Base': '#94a3b8',
                    'Gold': '#fbbf24',
                    'Gummy': '#ec4899',
                    'Galaxy': '#a855f7'
                };
                
                return (
                    <div style={{ textAlign: 'center' }}>
                        <div
                            onContextMenu={(e) => e.preventDefault()}
                            style={{ width: '100%', aspectRatio: '1 / 1', borderRadius: '0.5rem', overflow: 'hidden', background: 'rgba(0,0,0,0.1)' }}
                        >
                            <img 
                                src={getImagePath(spriteName, 'Base')}
                                {...noCalloutImgProps}
                                style={{
                                    ...noCalloutImgProps.style,
                                    width: '100%',
                                    height: '100%',
                                    objectFit: 'contain'
                                }}
                                alt="Base"
                            />
                        </div>
                        
                        <div style={{ display: 'flex', justifyContent: 'center', gap: '0.35rem', marginTop: '0.3rem' }}>
                            {variants.map((variant, idx) => {
                                const isCollected = collectedStatus && collectedStatus[idx];
                                const isMastered = masteredStatus && masteredStatus[idx];
                                const color = variantColors[variant] || '#94a3b8';
                                
                                return (
                                    <div 
                                        key={variant}
                                        style={{
                                            width: '9px',
                                            height: '9px',
                                            borderRadius: '50%',
                                            background: isCollected ? color : '#4b5563',
                                            border: isMastered ? `1px solid ${masteredAccent}` : '1px solid transparent',
                                            boxShadow: isMastered ? 'inset 0 0 0 0.5px #000' : 'none',
                                            boxSizing: 'border-box'
                                        }}
                                        title={variant}
                                    />
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

            // Keep wander points clear of the chest itself (a disk around the
            // stage center) by pushing anything too close radially outward.
            const CHEST_EXCLUDE_RADIUS = 21; // percent of stage size
            const keepClearOfChest = (x, y) => {
                const dx = x - 50, dy = y - 50;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist >= CHEST_EXCLUDE_RADIUS) return { x, y };
                const angle = dist === 0 ? Math.random() * Math.PI * 2 : Math.atan2(dy, dx);
                const pushed = CHEST_EXCLUDE_RADIUS + Math.random() * 6;
                return {
                    x: clamp(50 + Math.cos(angle) * pushed, 4, 96),
                    y: clamp(50 + Math.sin(angle) * pushed, 4, 92)
                };
            };

            // Each sprite gets a home spot plus 3 nearby waypoints (for a gentle
            // infinite wander loop, kept clear of the chest) and a random stagger
            // delay for the "sucked into the chest" moment once Roll is pressed.
            const generateScatterItems = (pool) => {
                const staggerStep = Math.max(6, Math.min(30, Math.floor(360 / pool.length)));
                return pool.map(id => {
                    const home = keepClearOfChest(10 + Math.random() * 80, 10 + Math.random() * 75);
                    const jitter = () => keepClearOfChest(
                        clamp(home.x + (Math.random() * 26 - 13), 4, 96),
                        clamp(home.y + (Math.random() * 26 - 13), 4, 92)
                    );
                    return {
                        id, xPct: home.x, yPct: home.y,
                        wp: [jitter(), jitter(), jitter()],
                        roamDuration: 4 + Math.random() * 4,
                        roamDelay: Math.random() * 3,
                        gatherDelay: Math.random() * staggerStep * pool.length * 0.6
                    };
                });
            };

            const resetToIdle = () => {
                if (rouletteTimeoutRef.current) {
                    clearTimeout(rouletteTimeoutRef.current);
                    rouletteTimeoutRef.current = null;
                }
                setRouletteResult(null);
                setFrozenPositions({});
                setRoulettePhase('idle');
                if (collected.length > 0) setScatterItems(generateScatterItems(collected));
            };

            const resetRoulette = () => {
                if (rouletteTimeoutRef.current) {
                    clearTimeout(rouletteTimeoutRef.current);
                    rouletteTimeoutRef.current = null;
                }
                setRoulettePhase('idle');
                setScatterItems([]);
                setFrozenPositions({});
                setRouletteResult(null);
            };

            const openRoulette = () => {
                resetRoulette();
                if (collected.length > 0) setScatterItems(generateScatterItems(collected));
                setRoulette(true);
            };

            const startRoll = () => {
                const pool = collected;
                if (pool.length === 0 || scatterItems.length === 0) return;
                if (rouletteTimeoutRef.current) clearTimeout(rouletteTimeoutRef.current);
                setRouletteResult(null);

                // Snapshot exactly where each sprite is on screen right now (mid
                // wander) and lock it in as a static position, so the very next
                // step has a real, stable starting point to transition from —
                // rather than snapping straight to wherever the CSS animation's
                // "home" value happened to be.
                const container = stageRef.current;
                const frozen = {};
                if (container) {
                    const rect = container.getBoundingClientRect();
                    scatterItems.forEach(item => {
                        const el = rouletteItemRefs.current[item.id];
                        if (el) {
                            const r = el.getBoundingClientRect();
                            const cx = r.left + r.width / 2 - rect.left;
                            const cy = r.top + r.height / 2 - rect.top;
                            frozen[item.id] = {
                                x: clamp((cx / rect.width) * 100, 0, 100),
                                y: clamp((cy / rect.height) * 100, 0, 100)
                            };
                        }
                    });
                }
                setFrozenPositions(frozen);

                // Wait two paints: one to commit the frozen (non-animated, non-
                // transitioning) position, then start the transition to the
                // chest from that now-stable starting point.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        setRoulettePhase('gather');
                        const maxDelay = Math.max(0, ...scatterItems.map(it => it.gatherDelay));
                        const gatherDuration = maxDelay + 700;

                        rouletteTimeoutRef.current = setTimeout(() => {
                            setRoulettePhase('shake');
                            if (navigator.vibrate) navigator.vibrate(40);
                            rouletteTimeoutRef.current = setTimeout(() => {
                                const finalId = pool[Math.floor(Math.random() * pool.length)];
                                // Settle at rest (animation off, normal size) for one clean
                                // frame first, so the shrink/shift into "burst" has a stable
                                // starting point to transition from instead of snapping.
                                setRoulettePhase('settle');
                                requestAnimationFrame(() => {
                                    requestAnimationFrame(() => {
                                        setRoulettePhase('burst');
                                        setRouletteResult(finalId);
                                        if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
                                    });
                                });
                            }, 650);
                        }, gatherDuration);
                    });
                });
            };

            useEffect(() => {
                return () => { if (rouletteTimeoutRef.current) clearTimeout(rouletteTimeoutRef.current); };
            }, []);

            const toggle = (n, v) => {
                const id = n + '-' + v;
                setCollected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
                setMastered(p => p.filter(x => x !== id));
            };

            const longPress = (n, v) => {
                const id = n + '-' + v;
                const c = collected.includes(id);
                const m = mastered.includes(id);
                
                if (navigator.vibrate) navigator.vibrate(60);
                
                if (!c) { 
                    setCollected(p => [...p, id]); 
                    setMastered(p => [...p, id]); 
                }
                else if (!m) { 
                    setMastered(p => [...p, id]); 
                }
                else { 
                    setMastered(p => p.filter(x => x !== id)); 
                }
            };

            // Pointer Events fire exactly once per physical press across mouse,
            // touch, and pen (no duplicate/"ghost" mouse events like touch
            // handlers can trigger), which is what was causing a completed
            // long-press to be immediately undone by a delayed synthetic tap.
            const handlePointerDown = (e, n, v) => {
                e.preventDefault();
                const id = n + '-' + v;
                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }
                longPressFlag.current[id] = false;
                try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
                longPressTimers.current[id] = setTimeout(() => {
                    longPressFlag.current[id] = true;
                    longPress(n, v);
                }, 500);
            };

            const handlePointerUp = (e, n, v) => {
                const id = n + '-' + v;
                const isLongPress = longPressFlag.current[id];

                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }

                if (!isLongPress) {
                    toggle(n, v);
                }

                longPressFlag.current[id] = false;
            };

            // Pointer left the element or the gesture was cancelled (e.g. the OS
            // took over for a system gesture) — just clean up, don't toggle.
            const handlePointerCancel = (e, n, v) => {
                const id = n + '-' + v;
                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }
                longPressFlag.current[id] = false;
            };

            const bgColor = isMasterCollector 
                ? (dark ? '#2d1b4e' : '#faf5ff')
                : (dark ? '#0f172a' : '#f1f5f9');
            const textColor = isMasterCollector 
                ? (dark ? '#e2e8f0' : '#4c1d95')
                : (dark ? '#e2e8f0' : '#0f172a');
            const cardBg = isMasterCollector 
                ? (dark ? 'rgba(88, 28, 135, 0.3)' : 'rgba(192, 132, 250, 0.25)')
                : (dark ? 'rgba(30,41,59,0.4)' : 'rgba(226,232,240,0.7)');
            const cardBorder = isMasterCollector 
                ? (dark ? 'rgba(168, 85, 247, 0.5)' : 'rgba(168, 85, 247, 0.6)')
                : (dark ? 'rgba(100,116,139,0.3)' : 'rgba(71,85,105,0.4)');
            const accentColor = isMasterCollector ? '#a855f7' : '#06b6d4';
            const masteredAccent = isMasterCollector ? '#ec4899' : '#fbbf24';

            if (roulette) {
                const pool = collected;
                const resultInfo = rouletteResult ? splitId(rouletteResult) : null;
                const isBusy = roulettePhase === 'gather' || roulettePhase === 'shake' || roulettePhase === 'settle';
                const goBack = () => { resetRoulette(); setRoulette(false); };

                return <div style={{ width: '100%', minHeight: '100vh', background: bgColor, color: textColor, padding: '2rem 1rem', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div style={{ width: '100%', maxWidth: '480px', display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem' }}>
                        <button onClick={goBack} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>← Back</button>
                        <button onClick={() => setDark(!dark)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                    </div>

                    <h1 style={{ fontSize: '2rem', fontWeight: 900, margin: '0 0 0.25rem 0', background: 'linear-gradient(90deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%)', backgroundClip: 'text', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', color: '#06b6d4' }}>Sprite Roulette</h1>
                    <div style={{ opacity: 0.7, marginBottom: '2.5rem', fontSize: '0.9rem' }}>{pool.length} collected sprite{pool.length === 1 ? '' : 's'} in the pool</div>

                    {pool.length === 0 ? (
                        <div style={{ background: cardBg, padding: '2rem', borderRadius: '1rem', border: `1px solid ${cardBorder}`, textAlign: 'center', maxWidth: '320px' }}>
                            Collect a few sprites first, then come back to roll!
                        </div>
                    ) : (
                        <>
                            <div ref={stageRef} style={{ position: 'relative', width: 'min(90vw, 460px)', height: 'min(90vw, 460px)', marginBottom: '2rem' }}>
                                {/* Every collected sprite wanders the stage until Roll is pressed, then flies into the chest */}
                                {(roulettePhase === 'idle' || roulettePhase === 'gather') && scatterItems.map((item) => {
                                    const info = splitId(item.id);
                                    const isGathering = roulettePhase === 'gather';
                                    const frozen = frozenPositions[item.id];
                                    const baseX = frozen ? frozen.x : item.xPct;
                                    const baseY = frozen ? frozen.y : item.yPct;
                                    return (
                                        <div
                                            key={item.id}
                                            ref={el => { rouletteItemRefs.current[item.id] = el; }}
                                            style={{
                                                position: 'absolute',
                                                width: '42px',
                                                height: '42px',
                                                left: isGathering ? '50%' : `${baseX}%`,
                                                top: isGathering ? '50%' : `${baseY}%`,
                                                transform: `translate(-50%, -50%) scale(${isGathering ? 0.15 : 1})`,
                                                opacity: isGathering ? 0 : 1,
                                                animation: (!frozen && !isGathering) ? `roam ${item.roamDuration}s ease-in-out ${item.roamDelay}s infinite` : 'none',
                                                transition: isGathering ? `left 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, top 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, transform 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, opacity 0.35s ease-in ${item.gatherDelay + 300}ms` : 'none',
                                                '--x0': `${item.xPct}%`, '--y0': `${item.yPct}%`,
                                                '--x1': `${item.wp[0].x}%`, '--y1': `${item.wp[0].y}%`,
                                                '--x2': `${item.wp[1].x}%`, '--y2': `${item.wp[1].y}%`,
                                                '--x3': `${item.wp[2].x}%`, '--y3': `${item.wp[2].y}%`
                                            }}
                                        >
                                            <img src={getImagePath(info.name, info.variant)} {...noCalloutImgProps} style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }} alt="" />
                                        </div>
                                    );
                                })}

                                {/* Chest wrapper handles shake + shrink/shift; the two images crossfade inside it so the closed→open swap isn't an instant pop */}
                                <div
                                    style={{
                                        position: 'absolute', top: '50%', left: '50%',
                                        transform: roulettePhase === 'burst' ? 'translate(calc(-50% - 19px), calc(-50% - 19px))' : 'translate(-50%, -50%)',
                                        width: roulettePhase === 'burst' ? '132px' : '150px',
                                        height: roulettePhase === 'burst' ? '132px' : '150px',
                                        transition: 'width 0.45s ease-out, height 0.45s ease-out, transform 0.45s ease-out',
                                        animation: roulettePhase === 'shake' ? 'chestShake 0.5s ease-in-out 2' : 'none',
                                        filter: roulettePhase === 'burst' ? `drop-shadow(0 0 20px ${masteredAccent})` : 'none'
                                    }}
                                >
                                    <img
                                        src={CHEST_CLOSED}
                                        {...noCalloutImgProps}
                                        style={{ ...noCalloutImgProps.style, position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', opacity: roulettePhase === 'burst' ? 0 : 1, transition: 'opacity 0.3s ease-out' }}
                                        alt="Loot chest"
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                    <img
                                        src={CHEST_OPEN}
                                        {...noCalloutImgProps}
                                        style={{ ...noCalloutImgProps.style, position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', opacity: roulettePhase === 'burst' ? 1 : 0, transition: 'opacity 0.3s ease-out' }}
                                        alt=""
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                </div>

                                {/* Burst flash + soft star sparkles + final reveal */}
                                {roulettePhase === 'burst' && resultInfo && (
                                    <>
                                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: '200px', height: '200px', borderRadius: '50%', background: `radial-gradient(circle, ${masteredAccent}99 0%, transparent 70%)`, animation: 'burstFlash 0.6s ease-out forwards' }} />
                                        {[0, 1, 2, 3, 4, 5].map(i => (
                                            <div key={i} style={{ position: 'absolute', top: '50%', left: '50%', width: '10px', height: '10px', borderRadius: '50%', background: `radial-gradient(circle, ${masteredAccent} 0%, transparent 75%)`, filter: 'blur(1.5px)', '--rot': `${i * 60}deg`, animation: `sparkleFloat 1s ease-out ${i * 0.05}s forwards` }} />
                                        ))}
                                        <div style={{ position: 'absolute', top: '50%', left: '50%', width: '100px', height: '100px', animation: 'popInCentered 0.5s ease-out 0.15s both', filter: `drop-shadow(0 0 12px ${masteredAccent})` }}>
                                            <img src={getImagePath(resultInfo.name, resultInfo.variant)} {...noCalloutImgProps} style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }} alt="" />
                                        </div>
                                    </>
                                )}
                            </div>

                            {roulettePhase === 'burst' && resultInfo && (
                                <div style={{ textAlign: 'center', marginBottom: '1.5rem', animation: 'popIn 0.4s ease-out 0.3s both' }}>
                                    <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{resultInfo.name}</div>
                                    <div style={{ fontSize: '0.9rem', color: accentColor }}>{resultInfo.variant}</div>
                                </div>
                            )}

                            <button
                                onClick={roulettePhase === 'burst' ? resetToIdle : startRoll}
                                disabled={isBusy}
                                style={{
                                    padding: '0.75rem 2rem',
                                    background: isBusy ? cardBg : masteredAccent,
                                    color: isBusy ? accentColor : 'white',
                                    border: 'none',
                                    borderRadius: '0.5rem',
                                    cursor: isBusy ? 'default' : 'pointer',
                                    fontWeight: 'bold',
                                    fontSize: '1rem',
                                    opacity: isBusy ? 0.7 : 1
                                }}
                            >
                                {roulettePhase === 'idle' ? 'Open Chest' : roulettePhase === 'burst' ? 'Roll Again' : roulettePhase === 'gather' ? 'Gathering...' : 'Opening...'}
                            </button>
                        </>
                    )}
                </div>;
            }

            if (share) {
                return <div style={{ width: '100%', maxWidth: '1280px', margin: '0 auto', padding: '0.75rem 1rem', background: bgColor, color: textColor, height: '100dvh', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', flexShrink: 0 }}>
                        <button onClick={() => setShare(false)} style={{ padding: '0.4rem 0.8rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>← Back</button>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button onClick={() => setDark(!dark)} style={{ padding: '0.4rem 0.8rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                            {masterCollectorUnlocked && <button onClick={() => setMasterCollectorActive(!masterCollectorActive)} style={{ padding: '0.4rem 0.8rem', background: masterCollectorActive ? '#a855f7' : cardBg, color: masterCollectorActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨</button>}
                        </div>
                    </div>
                    
                    <h2 style={{ fontSize: '1rem', fontWeight: 700, margin: '0 0 0.5rem 0', flexShrink: 0 }}>Full collection</h2>

                    <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', justifyContent: 'center', overflow: 'hidden' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${shareColumns}, 1fr)`, gap: '1rem 0.75rem' }}>
                            {sprites.map(sp => {
                                const collectedStatus = sp.v.map(vv => collected.includes(sp.name + '-' + vv));
                                const masteredStatus = sp.v.map(vv => mastered.includes(sp.name + '-' + vv));
                                const c = collectedStatus.filter(Boolean).length;
                                
                                return (
                                    <div key={sp.name} style={{ textAlign: 'center', minWidth: 0 }}>
                                        <CompositeImage spriteName={sp.name} variants={sp.v} collectedStatus={collectedStatus} masteredStatus={masteredStatus} />
                                        <div style={{ fontSize: '0.75rem', fontWeight: 600, marginTop: '0.3rem', overflowWrap: 'break-word', lineHeight: 1.15 }}>
                                            {sp.name}
                                        </div>
                                        <div style={{ fontSize: '0.65rem', color: accentColor, fontWeight: 500 }}>
                                            {c}/{sp.v.length}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>;
            }

            return <div style={{ width: '100%', background: bgColor, color: textColor, minHeight: '100vh', padding: '2rem 0' }}>
                {showMasterCollectorPopup && <MasterCollectorPopup onClose={() => setShowMasterCollectorPopup(false)} onEnable={() => setMasterCollectorActive(true)} />}
                <div style={{ width: '100%', maxWidth: '1280px', margin: '0 auto', padding: '0 2rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '2rem' }}>
                        <div />
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', alignItems: 'flex-end' }}>
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                <button onClick={() => setShare(true)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }} title="↑ to screenshot full collection">↑</button>
                                <button onClick={openRoulette} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }} title="🎲 to roll a random collected sprite">🎲</button>
                                <button onClick={() => setDark(!dark)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                            </div>
                            {masterCollectorUnlocked && <button onClick={() => setMasterCollectorActive(!masterCollectorActive)} style={{ padding: '0.5rem 1rem', background: masterCollectorActive ? '#a855f7' : cardBg, color: masterCollectorActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨ Master Collector</button>}
                        </div>
                    </div>

                    <div style={{ background: cardBg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '2rem', border: `1px solid ${cardBorder}` }}>
                        <span style={{ color: accentColor, fontWeight: 'bold' }}>Tap</span> to collect • <span style={{ color: masteredAccent, fontWeight: 'bold' }}>long press</span> to master • <span style={{ color: accentColor, fontWeight: 'bold' }}>↑</span> to screenshot • <span style={{ color: accentColor, fontWeight: 'bold' }}>🎲</span> to roll a random Sprite
                    </div>

                    <h1 style={{ fontSize: '3rem', fontWeight: 900, margin: '1rem 0', background: 'linear-gradient(90deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%)', backgroundSize: '100% 100%', backgroundClip: 'text', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', color: '#06b6d4' }}>
                        {isMasterCollector ? 'MASTER COLLECTOR' : 'SPRITE COLLECTION'}
                    </h1>
                    
                    <div style={{ background: cardBg, padding: '2rem', borderRadius: '1rem', border: `1px solid ${cardBorder}`, marginBottom: '3rem', boxShadow: isMasterCollector ? '0 0 24px rgba(168, 85, 247, 0.5)' : 'none' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '2rem' }}>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Collected</div>
                                <Pie col={col} tot={tot} r={40} col_val={accentColor} format="fraction" />
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Mastered</div>
                                <Pie col={mas} tot={tot} r={40} col_val={masteredAccent} format="fraction" />
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Progress</div>
                                <Pie col={col} tot={tot} r={40} col_val={accentColor} format="percentage" />
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '1.5rem' }}>
                        {sprites.map(sp => {
                            const c = sp.v.filter(vv => collected.includes(sp.name + '-' + vv)).length;
                            const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                            return (
                                <div key={sp.name} style={{ background: cardBg, padding: '1.5rem', borderRadius: '0.75rem', border: `1px solid ${cardBorder}`, position: 'relative', boxShadow: isMasterCollector ? '0 0 20px rgba(168, 85, 247, 0.4)' : 'none' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                        <div style={{ fontSize: '1.125rem', fontWeight: 700 }}>
                                            {sp.name}
                                        </div>
                                        <div style={{ fontSize: '0.875rem', fontWeight: 600, color: accentColor, display: 'flex', alignItems: 'center', justifyContent: 'center', width: '32px', height: '32px', borderRadius: '50%', border: `2px solid ${accentColor}` }}>
                                            {c}/{sp.v.length}
                                        </div>
                                    </div>
                                    
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.75rem' }}>
                                        {sp.v.map(vv => {
                                            const id = sp.name + '-' + vv;
                                            const isC = collected.includes(id);
                                            const isM = mastered.includes(id);
                                            return (
                                                <div
                                                    key={vv}
                                                    onContextMenu={(e) => e.preventDefault()}
                                                    onPointerDown={(e) => handlePointerDown(e, sp.name, vv)}
                                                    onPointerUp={(e) => handlePointerUp(e, sp.name, vv)}
                                                    onPointerCancel={(e) => handlePointerCancel(e, sp.name, vv)}
                                                    onPointerLeave={(e) => handlePointerCancel(e, sp.name, vv)}
                                                    style={{
                                                        width: '100%',
                                                        height: '120px',
                                                        borderRadius: '0.5rem',
                                                        overflow: 'hidden',
                                                        opacity: isC ? 1 : 0.3,
                                                        cursor: 'pointer',
                                                        transition: 'all 0.3s',
                                                        background: 'rgba(0,0,0,0.1)',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        touchAction: 'manipulation',
                                                        WebkitTouchCallout: 'none'
                                                    }}
                                                >
                                                    <img 
                                                        src={getImagePath(sp.name, vv)} 
                                                        {...noCalloutImgProps}
                                                        style={{
                                                            ...noCalloutImgProps.style,
                                                            width: '90%', 
                                                            height: '90%', 
                                                            objectFit: 'contain',
                                                            filter: isM ? `drop-shadow(0 0 6px ${masteredAccent})` : 'none'
                                                        }} 
                                                        alt={vv}
                                                        onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
