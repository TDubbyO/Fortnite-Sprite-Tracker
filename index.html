<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@latest/dist/html2canvas-pro.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        @keyframes chestShake {
            0%, 100% { transform: translate(-50%, -50%) translateX(0) rotate(0deg); }
            20% { transform: translate(-50%, -50%) translateX(-6px) rotate(-3deg); }
            40% { transform: translate(-50%, -50%) translateX(6px) rotate(3deg); }
            60% { transform: translate(-50%, -50%) translateX(-4px) rotate(-2deg); }
            80% { transform: translate(-50%, -50%) translateX(4px) rotate(2deg); }
        }
        @keyframes burstFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
            35% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.9); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(24px) scale(0.5); }
            60% { opacity: 1; transform: translateY(-8px) scale(1.08); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes popInCentered {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(24px) scale(0.5); }
            60% { opacity: 1; transform: translate(-50%, -50%) translateY(-8px) scale(1.08); }
            100% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
        }
        @keyframes sparkleFloat {
            0% { opacity: 0; transform: rotate(var(--rot, 0deg)) translate(36px) scale(0.3); }
            30% { opacity: 0.8; }
            100% { opacity: 0; transform: rotate(var(--rot, 0deg)) translate(66px) scale(1); }
        }
        @keyframes roam {
            0% { left: var(--x0); top: var(--y0); }
            18% { left: var(--x1); top: var(--y1); }
            32% { left: var(--x1); top: var(--y1); }
            50% { left: var(--x2); top: var(--y2); }
            64% { left: var(--x2); top: var(--y2); }
            82% { left: var(--x3); top: var(--y3); }
            92% { left: var(--x3); top: var(--y3); }
            100% { left: var(--x0); top: var(--y0); }
        }
        @keyframes spriteHop {
            0% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            3% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            6% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            7% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            10% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            13% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            14% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            18% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            32% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            35% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            38% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            39% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            42% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            45% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            46% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            50% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            64% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            67% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            70% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            71% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            74% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            77% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            78% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            82% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            92% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            94.5% { transform: translate(-50%, -50%) translateY(-10px) scaleY(1); }
            97% { transform: translate(-50%, -50%) translateY(0) scaleY(0.85); }
            98% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
            100% { transform: translate(-50%, -50%) translateY(0) scaleY(1); }
        }
    </style>
</head>
<body style="margin:0; padding:0; -webkit-user-select: none; user-select: none;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // Flip this to true once the remaining unconfirmed content (Gem
        // variant expansion) is actually uploaded to /images/ and ready to ship.
        const NEW_CONTENT_LIVE = false;

        const BASE_SPRITES = [
            { name: 'Batman', color: '#1e293b', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Water', color: '#3b82f6', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Earth', color: '#16a34a', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fire', color: '#ef4444', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Duck', color: '#facc15', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Ghost', color: '#dea4c3', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Dream', color: '#94a3b8', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Demon', color: '#991b1b', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Punk', color: '#ec4899', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'King', color: '#7c3aed', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Pollo', color: '#fbbf24', v: ['Base'] },
            { name: 'Vini Jr.', color: '#22c55e', v: ['Base'] },
            { name: 'Burnt Peanut', color: '#d2a679', v: ['Base'] },
            { name: 'Zero Point', color: '#c026d3', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fishy', color: '#f97316', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Striker', color: '#000000', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Aura', color: '#a3a3a3', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Boss', color: '#dc2626', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Grim', color: '#475569', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Air', color: '#d4d0a8', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
            { name: 'Seven', color: '#617a93', v: ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil'] },
        ];

        // Gem is still unconfirmed and expected to eventually apply across the
        // whole collection once NEW_CONTENT_LIVE flips to true. Every sprite
        // that doesn't already have Holofoil for real also picks up Holofoil
        // at that point; the de-dup filter below means sprites that already
        // ship with real Holofoil (Water, Fire, King, Ghost, Striker, Air,
        // Batman, Seven) won't end up with it listed twice.
        const sprites = NEW_CONTENT_LIVE
            ? BASE_SPRITES.map(sp => ({ ...sp, v: [...sp.v, ...['Gem', 'Holofoil'].filter(x => !sp.v.includes(x))] }))
            : BASE_SPRITES;

        // Filename suffixes don't always match the lowercased display name
        // (Holofoil's file suffix is "holo", not "holofoil").
        const VARIANT_FILE_SUFFIX = {
            Base: 'base', Gold: 'gold', Gummy: 'gummy', Galaxy: 'galaxy',
            Gem: 'gem', Holofoil: 'holo'
        };

        const getImagePath = (spriteName, variant) => {
            const nameMap = {
                'Water': 'Water', 'Earth': 'Earth', 'Fire': 'Fire', 'Duck': 'Duck',
                'Ghost': 'Ghost', 'Dream': 'Dream', 'Demon': 'Demon', 'Punk': 'Punk',
                'King': 'King', 'Burnt Peanut': 'Burntpeanut', 'Zero Point': 'Zeropoint',
                'Fishy': 'Fishy', 'Striker': 'Striker', 'Aura': 'Aura', 'Boss': 'Boss', 'Grim': 'Grim',
                'Seven': 'Seven', 'Air': 'Air', 'Batman': 'Batman', 'Pollo': 'Pollo', 'Vini Jr.': 'Vini-Jr'
            };
            const mappedName = nameMap[spriteName];
            const suffix = VARIANT_FILE_SUFFIX[variant] || variant.toLowerCase();
            return `/images/${mappedName}-${suffix}.webp`;
        };

        // Update these two filenames if your uploaded chest images use different names.
        const CHEST_CLOSED = '/images/Chest-closed.png';
        const CHEST_OPEN = '/images/Chest-open.png';

        // Sprite names never contain a hyphen, so the LAST hyphen always
        // separates the variant (Base/Gold/Gummy/Galaxy) from the name.
        const splitId = (id) => {
            const idx = id.lastIndexOf('-');
            return { name: id.slice(0, idx), variant: id.slice(idx + 1) };
        };

        // Shared style/props to stop the native long-press image menu (context menu,
        // "save image", callout) from appearing on iOS/Android while still allowing
        // our own onPointerDown/onPointerUp long-press logic to run.
        const noCalloutImgProps = {
            draggable: false,
            onDragStart: (e) => e.preventDefault(),
            onContextMenu: (e) => e.preventDefault(),
            style: {
                WebkitTouchCallout: 'none',
                WebkitUserSelect: 'none',
                userSelect: 'none',
                WebkitUserDrag: 'none',
                pointerEvents: 'none' // let the parent div own all touch/mouse handling
            }
        };

        const Pie = ({ col, tot, r, col_val, format }) => {
            const pct = tot > 0 ? (col / tot) * 100 : 0;
            const id = `m${Math.random().toString(36).substr(2, 9)}`;
            const displayText = format === 'fraction' ? `${col}/${tot}` : `${Math.round(pct)}%`;
            
            const rad = (pct * 360) / 100;
            const isLarge = pct > 50 ? 1 : 0;
            const x1 = r + 10 + r * Math.cos(-Math.PI / 2);
            const y1 = r + 10 + r * Math.sin(-Math.PI / 2);
            const x2 = r + 10 + r * Math.cos(-Math.PI / 2 + (rad * Math.PI) / 180);
            const y2 = r + 10 + r * Math.sin(-Math.PI / 2 + (rad * Math.PI) / 180);
            const pathData = `M ${r + 10} ${r + 10} L ${x1} ${y1} A ${r} ${r} 0 ${isLarge} 1 ${x2} ${y2} Z`;
            
            return (
                <svg width={r * 2 + 20} height={r * 2 + 20} viewBox={`0 0 ${r * 2 + 20} ${r * 2 + 20}`} style={{ maxWidth: '100%' }}>
                    <defs>
                        <mask id={id}>
                            <rect width={r * 2 + 20} height={r * 2 + 20} fill="black" />
                            <path d={pathData} fill="white" />
                        </mask>
                    </defs>
                    <circle cx={r + 10} cy={r + 10} r={r} fill={col_val} opacity="0.15" />
                    <path d={pathData} fill={col_val} />
                    <text x={r + 10} y={r + 10} dominantBaseline="central" textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill={col_val}>{displayText}</text>
                    <text x={r + 10} y={r + 10} dominantBaseline="central" textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill="white" mask={`url(#${id})`}>{displayText}</text>
                </svg>
            );
        };

        const MasterCollectorPopup = ({ onClose, onEnable }) => (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                <div style={{ background: 'linear-gradient(135deg, #1a0033, #330066)', padding: '3rem 2rem', borderRadius: '1rem', textAlign: 'center', maxWidth: '400px', border: '2px solid #a855f7' }}>
                    <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>✨</div>
                    <h2 style={{ color: '#a855f7', fontSize: '2rem', fontWeight: 900, margin: '1rem 0' }}>Master Collector!</h2>
                    <p style={{ color: '#e2e8f0', fontSize: '1rem', marginBottom: '2rem' }}>All sprites collected!</p>
                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center' }}>
                        <button onClick={onClose} style={{ padding: '0.75rem 1.5rem', background: 'rgba(255,255,255,0.2)', color: 'white', border: '1px solid #a855f7', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Later</button>
                        <button onClick={() => { onEnable(); onClose(); }} style={{ padding: '0.75rem 1.5rem', background: '#a855f7', color: 'white', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Activate ✨</button>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [collected, setCollected] = useState(() => JSON.parse(localStorage.getItem('c') || '[]'));
            const [viewportWidth, setViewportWidth] = useState(() => window.innerWidth);
            useEffect(() => {
                const onResize = () => setViewportWidth(window.innerWidth);
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);
            const shareColumns = viewportWidth >= 700 ? 6 : 4;
            const [mastered, setMastered] = useState(() => JSON.parse(localStorage.getItem('m') || '[]'));
            const [share, setShare] = useState(false);
            const [dark, setDark] = useState(() => JSON.parse(localStorage.getItem('t') || 'true'));
            const [masterCollectorSeen, setMasterCollectorSeen] = useState(() => JSON.parse(localStorage.getItem('mythic') || 'false'));
            const [showMasterCollectorPopup, setShowMasterCollectorPopup] = useState(false);
            const [masterCollectorActive, setMasterCollectorActive] = useState(() => JSON.parse(localStorage.getItem('mythicActive') || 'false'));
            const [roulette, setRoulette] = useState(false);
            const [roulettePhase, setRoulettePhase] = useState('idle'); // idle (roaming) | gather | shake | burst
            const [scatterItems, setScatterItems] = useState([]); // [{id, xPct, yPct, wp:[{x,y}x3], roamDuration, roamDelay, gatherDelay}]
            const [rouletteResult, setRouletteResult] = useState(null);
            const rouletteTimeoutRef = useRef(null);
            const [frozenPositions, setFrozenPositions] = useState({}); // id -> {x, y} snapshot taken at click time
            const stageRef = useRef(null);
            const captureRef = useRef(null);
            const gridWrapperRef = useRef(null);
            const [gridScale, setGridScale] = useState(1);
            const [savingImage, setSavingImage] = useState(false);

            // scrollHeight reflects the grid's natural, untransformed size
            // regardless of any CSS scale already applied, so this is safe to
            // recompute even while a previous scale is active.
            useEffect(() => {
                if (!share) return;
                const measure = () => {
                    if (!captureRef.current || !gridWrapperRef.current) return;
                    const contentHeight = captureRef.current.scrollHeight;
                    const availableHeight = gridWrapperRef.current.clientHeight;
                    if (contentHeight > 0 && availableHeight > 0) {
                        setGridScale(Math.min(1, availableHeight / contentHeight));
                    }
                };
                measure();
                const raf = requestAnimationFrame(measure); // catch late image-driven layout shifts
                window.addEventListener('resize', measure);
                return () => {
                    cancelAnimationFrame(raf);
                    window.removeEventListener('resize', measure);
                };
            }, [share, collected, mastered, shareColumns, dark, isMasterCollector]);
            const rouletteItemRefs = useRef({});
            const longPressTimers = useRef({});
            const longPressFlag = useRef({});
            // 'all' | 'collected' | 'uncollected', and 'all' | 'mastered' | 'unmastered'
            const [filterCollectedMode, setFilterCollectedMode] = useState(() => localStorage.getItem('filterCollectedMode') || 'all');
            const [filterMasteredMode, setFilterMasteredMode] = useState(() => localStorage.getItem('filterMasteredMode') || 'all');
            const [viewMode, setViewMode] = useState(() => {
                const saved = localStorage.getItem('viewMode');
                if (saved === 'cozy' || saved === 'compact' || saved === 'list') return saved;
                // Migrate the old Cozy/Compact boolean toggle so existing choices carry over.
                return JSON.parse(localStorage.getItem('compactView') || 'false') ? 'compact' : 'cozy';
            });
            const compactView = viewMode === 'compact';
            const listView = viewMode === 'list';
            const [statsExpanded, setStatsExpanded] = useState(() => JSON.parse(localStorage.getItem('statsExpanded') || 'false'));
            const [filtersExpanded, setFiltersExpanded] = useState(() => JSON.parse(localStorage.getItem('filtersExpanded') || 'false'));
            const [filterVariants, setFilterVariants] = useState(() => JSON.parse(localStorage.getItem('filterVariants') || '[]'));
            const [rollHistory, setRollHistory] = useState(() => JSON.parse(localStorage.getItem('rollHistory') || '[]'));

            useEffect(() => { localStorage.setItem('c', JSON.stringify(collected)); }, [collected]);
            useEffect(() => { localStorage.setItem('m', JSON.stringify(mastered)); }, [mastered]);
            useEffect(() => { localStorage.setItem('t', JSON.stringify(dark)); }, [dark]);
            useEffect(() => { localStorage.setItem('mythic', JSON.stringify(masterCollectorSeen)); }, [masterCollectorSeen]);
            useEffect(() => { localStorage.setItem('mythicActive', JSON.stringify(masterCollectorActive)); }, [masterCollectorActive]);
            useEffect(() => { localStorage.setItem('filterCollectedMode', filterCollectedMode); }, [filterCollectedMode]);
            useEffect(() => { localStorage.setItem('filterMasteredMode', filterMasteredMode); }, [filterMasteredMode]);
            useEffect(() => { localStorage.setItem('filterVariants', JSON.stringify(filterVariants)); }, [filterVariants]);
            useEffect(() => { localStorage.setItem('viewMode', viewMode); }, [viewMode]);
            useEffect(() => { localStorage.setItem('statsExpanded', JSON.stringify(statsExpanded)); }, [statsExpanded]);
            useEffect(() => { localStorage.setItem('filtersExpanded', JSON.stringify(filtersExpanded)); }, [filtersExpanded]);
            useEffect(() => { localStorage.setItem('rollHistory', JSON.stringify(rollHistory)); }, [rollHistory]);

            const tot = sprites.reduce((sum, sp) => sum + sp.v.length, 0);
            const col = collected.length;
            const mas = mastered.length;
            const masterCollectorUnlocked = col === tot && tot > 0;
            const isMasterCollector = masterCollectorUnlocked && masterCollectorActive;

            useEffect(() => {
                if (masterCollectorUnlocked && !masterCollectorSeen) {
                    setMasterCollectorSeen(true);
                    setShowMasterCollectorPopup(true);
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100, 50, 200]);
                    }
                }
            }, [masterCollectorUnlocked, masterCollectorSeen]);

            useEffect(() => {
                if (masterCollectorActive && col < tot) {
                    setMasterCollectorActive(false);
                }
            }, [col, tot, masterCollectorActive]);

            const CompositeImage = ({ spriteName, variants, collectedStatus, masteredStatus }) => {
                return (
                    <div style={{ textAlign: 'center' }}>
                        <div
                            onContextMenu={(e) => e.preventDefault()}
                            style={{ width: '100%', position: 'relative', paddingTop: '100%', borderRadius: '0.5rem', overflow: 'hidden', background: 'rgba(0,0,0,0.1)' }}
                        >
                            <img 
                                src={getImagePath(spriteName, 'Base')}
                                {...noCalloutImgProps}
                                style={{
                                    ...noCalloutImgProps.style,
                                    position: 'absolute',
                                    inset: 0,
                                    width: '100%',
                                    height: '100%',
                                    objectFit: 'contain'
                                }}
                                alt="Base"
                            />
                        </div>
                        
                        <div style={{ display: 'flex', justifyContent: 'center', gap: '0.35rem', marginTop: '0.3rem' }}>
                            {variants.map((variant, idx) => {
                                const isCollected = collectedStatus && collectedStatus[idx];
                                const isMastered = masteredStatus && masteredStatus[idx];
                                const color = VARIANT_COLORS[variant] || '#94a3b8';
                                
                                return (
                                    <div
                                        key={variant}
                                        title={variant}
                                        style={{
                                            width: '9px', height: '9px', borderRadius: '50%',
                                            background: isMastered ? masteredAccent : 'transparent',
                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                            flexShrink: 0
                                        }}
                                    >
                                        <div style={{
                                            width: isMastered ? '7.5px' : '9px',
                                            height: isMastered ? '7.5px' : '9px',
                                            borderRadius: '50%',
                                            background: isMastered ? '#000' : 'transparent',
                                            display: 'flex', alignItems: 'center', justifyContent: 'center'
                                        }}>
                                            <div style={{
                                                width: isMastered ? '6px' : '9px',
                                                height: isMastered ? '6px' : '9px',
                                                borderRadius: '50%',
                                                background: isCollected ? color : '#4b5563'
                                            }} />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const ALL_VARIANTS = ['Base', 'Gold', 'Gummy', 'Galaxy', 'Holofoil', ...(NEW_CONTENT_LIVE ? ['Gem'] : [])];
            const VARIANT_COLORS = { Base: '#94a3b8', Gold: '#fbbf24', Gummy: '#ec4899', Galaxy: '#a855f7', Gem: '#10b981', Holofoil: '#14b8a6' };

            // A single sprite-variant tile passes the current filters if it
            // satisfies the variant-type selection AND the collected toggle
            // AND the mastered toggle (each independently, all must hold).
            const matchesFilters = (variant, isCollected, isMastered) => {
                if (filterVariants.length > 0 && !filterVariants.includes(variant)) return false;
                if (filterCollectedMode === 'collected' && !isCollected) return false;
                if (filterCollectedMode === 'uncollected' && isCollected) return false;
                if (filterMasteredMode === 'mastered' && !isMastered) return false;
                if (filterMasteredMode === 'unmastered' && isMastered) return false;
                return true;
            };

            const hasActiveFilters = filterCollectedMode !== 'all' || filterMasteredMode !== 'all' || filterVariants.length > 0;

            // Small colored dot + fraction/percentage chips, one per variant type.
            // Wraps to additional lines as more variants get added, instead of
            // squeezing or overflowing a fixed-width row.
            const renderVariantChips = (numeratorFn, format) => (
                <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '0.35rem', marginTop: '0.6rem' }}>
                    {ALL_VARIANTS.map(v => {
                        const t = sprites.filter(sp => sp.v.includes(v)).length;
                        const n = numeratorFn(v);
                        const label = format === 'percentage' ? `${t > 0 ? Math.round((n / t) * 100) : 0}%` : `${n}/${t}`;
                        return (
                            <div key={v} style={{ display: 'flex', alignItems: 'center', gap: '0.25rem', fontSize: '0.65rem', fontWeight: 700, background: cardBg, border: `1px solid ${cardBorder}`, borderRadius: '999px', padding: '0.15rem 0.45rem' }}>
                                <span style={{ width: '7px', height: '7px', borderRadius: '50%', background: VARIANT_COLORS[v] || '#94a3b8', flexShrink: 0 }} />
                                <span>{label}</span>
                            </div>
                        );
                    })}
                </div>
            );

            // A full-width, 3-segment status filter (All / positive / negative).
            // Each segment is its own large tap target instead of a tiny switch.
            const renderStatusFilter = (label, mode, setMode, positiveVal, positiveLabel, negativeVal, negativeLabel, color) => (
                <div style={{ marginBottom: '1rem' }}>
                    <div style={{ fontSize: '0.7rem', fontWeight: 700, opacity: 0.6, marginBottom: '0.4rem', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{label}</div>
                    <div style={{ display: 'flex', border: `1.5px solid ${color}`, borderRadius: '0.5rem', overflow: 'hidden' }}>
                        {[['all', 'All'], [positiveVal, positiveLabel], [negativeVal, negativeLabel]].map(([val, txt], i) => (
                            <button
                                key={val}
                                onClick={() => setMode(val)}
                                style={{
                                    flex: 1, padding: '0.65rem 0.3rem', border: 'none', cursor: 'pointer',
                                    borderLeft: i > 0 ? `1px solid ${mode === val ? 'rgba(255,255,255,0.4)' : color}` : 'none',
                                    background: mode === val ? color : 'transparent',
                                    color: mode === val ? 'white' : textColor,
                                    fontWeight: 'bold', fontSize: '0.78rem'
                                }}
                            >
                                {txt}
                            </button>
                        ))}
                    </div>
                </div>
            );

            const toggleVariantFilter = (variant) => {
                setFilterVariants(v => v.includes(variant) ? v.filter(x => x !== variant) : [...v, variant]);
            };
            const clearFilters = () => {
                setFilterCollectedMode('all');
                setFilterMasteredMode('all');
                setFilterVariants([]);
            };

            const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

            // Renders just the collection grid (not the header buttons) to a
            // clean PNG, then either opens the native share sheet — which on
            // iOS/Android lets you save straight to Photos or share to an app —
            // or falls back to a plain file download if that's unavailable.
            const saveCollectionImage = async () => {
                if (!captureRef.current || savingImage) return;
                setSavingImage(true);
                try {
                    // html2canvas loads async from a CDN <script> tag — if it hasn't
                    // finished (slow connection, blocked, etc.) wait briefly instead
                    // of silently failing.
                    let waited = 0;
                    while (!window.html2canvas && waited < 4000) {
                        await new Promise(res => setTimeout(res, 100));
                        waited += 100;
                    }
                    if (!window.html2canvas) {
                        alert("Couldn't load the image export tool — check your internet connection and try again.");
                        setSavingImage(false);
                        return;
                    }

                    // Make sure every sprite image has actually finished loading
                    // before snapshotting, so we never capture a blank/half-loaded frame.
                    const imgs = Array.from(captureRef.current.querySelectorAll('img'));
                    await Promise.all(imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => {
                        img.addEventListener('load', res, { once: true });
                        img.addEventListener('error', res, { once: true });
                    })));

                    // Force a fresh layout read so html2canvas sees fully committed styles.
                    void captureRef.current.offsetHeight;

                    const gridCanvas = await window.html2canvas(captureRef.current, {
                        backgroundColor: bgColor,
                        scale: 2,
                        useCORS: true,
                        logging: false
                    });

                    // Draw the title directly with the Canvas API instead of
                    // capturing the SVG through html2canvas — native canvas text
                    // rendering draws at full export resolution with no
                    // intermediate rasterization step, so it can't come out soft.
                    const titleHeight = Math.round(gridCanvas.width / 5.2);
                    const titleFontSize = Math.round(gridCanvas.width / 10.5);
                    const titleFont = `400 ${titleFontSize}px "Anton"`;
                    // Canvas text doesn't auto-wait for custom webfonts the way
                    // DOM rendering does — without this, the very first export
                    // could silently fall back to the default system font.
                    try { await document.fonts.load(titleFont); } catch (err) {}

                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = gridCanvas.width;
                    finalCanvas.height = gridCanvas.height + titleHeight;
                    const ctx = finalCanvas.getContext('2d');
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                    const gradient = ctx.createLinearGradient(0, 0, finalCanvas.width, 0);
                    gradient.addColorStop(0, '#06b6d4');
                    gradient.addColorStop(0.5, '#a855f7');
                    gradient.addColorStop(1, '#ec4899');
                    ctx.fillStyle = gradient;
                    ctx.font = titleFont;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('MY SPRITE VAULT', finalCanvas.width / 2, titleHeight / 2);

                    ctx.drawImage(gridCanvas, 0, titleHeight);

                    const canvas = finalCanvas;
                    canvas.toBlob(async (blob) => {
                        if (!blob) { setSavingImage(false); return; }
                        const fileName = 'sprite-collection.png';
                        const file = new File([blob], fileName, { type: 'image/png' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            try {
                                await navigator.share({ files: [file], title: 'My Sprite Collection' });
                                setSavingImage(false);
                                return;
                            } catch (err) {
                                // Share sheet cancelled or failed — fall through to a direct download.
                            }
                        }
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 1000);
                        setSavingImage(false);
                    }, 'image/png');
                } catch (err) {
                    console.error('Failed to save collection image', err);
                    alert('Something went wrong generating the image: ' + (err && err.message ? err.message : 'unknown error') + '. Please try again.');
                    setSavingImage(false);
                }
            };

            // Keep wander points clear of the chest itself (a disk around the
            // stage center) by pushing anything too close radially outward.
            const CHEST_EXCLUDE_RADIUS = 21; // percent of stage size
            const keepClearOfChest = (x, y) => {
                const dx = x - 50, dy = y - 50;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist >= CHEST_EXCLUDE_RADIUS) return { x, y };
                const angle = dist === 0 ? Math.random() * Math.PI * 2 : Math.atan2(dy, dx);
                const pushed = CHEST_EXCLUDE_RADIUS + Math.random() * 6;
                return {
                    x: clamp(50 + Math.cos(angle) * pushed, 4, 96),
                    y: clamp(50 + Math.sin(angle) * pushed, 4, 92)
                };
            };

            // Each sprite gets a home spot plus 3 nearby waypoints (for a gentle
            // infinite wander loop, kept clear of the chest) and a random stagger
            // delay for the "sucked into the chest" moment once Roll is pressed.
            const generateScatterItems = (pool) => {
                const staggerStep = Math.max(6, Math.min(30, Math.floor(360 / pool.length)));
                return pool.map(id => {
                    const home = keepClearOfChest(10 + Math.random() * 80, 10 + Math.random() * 75);
                    const jitter = () => keepClearOfChest(
                        clamp(home.x + (Math.random() * 26 - 13), 4, 96),
                        clamp(home.y + (Math.random() * 26 - 13), 4, 92)
                    );
                    const roamDuration = 9 + Math.random() * 7; // slower still (was 6-12s)
                    return {
                        id, xPct: home.x, yPct: home.y,
                        wp: [jitter(), jitter(), jitter()],
                        roamDuration,
                        roamDelay: Math.random() * 3,
                        gatherDelay: Math.random() * staggerStep * pool.length * 0.6
                    };
                });
            };

            // The roulette only ever draws from sprites you actually have, filtered
            // by whatever Collected/Mastered/Variant filters are currently active.
            const getRoulettePool = () => collected.filter(id => {
                const { variant } = splitId(id);
                return matchesFilters(variant, true, mastered.includes(id));
            });

            const resetToIdle = () => {
                if (rouletteTimeoutRef.current) {
                    clearTimeout(rouletteTimeoutRef.current);
                    rouletteTimeoutRef.current = null;
                }
                setRouletteResult(null);
                setFrozenPositions({});
                setRoulettePhase('idle');
                const pool = getRoulettePool();
                setScatterItems(pool.length > 0 ? generateScatterItems(pool) : []);
            };

            const resetRoulette = () => {
                if (rouletteTimeoutRef.current) {
                    clearTimeout(rouletteTimeoutRef.current);
                    rouletteTimeoutRef.current = null;
                }
                setRoulettePhase('idle');
                setScatterItems([]);
                setFrozenPositions({});
                setRouletteResult(null);
            };

            const openRoulette = () => {
                resetRoulette();
                const pool = getRoulettePool();
                setScatterItems(pool.length > 0 ? generateScatterItems(pool) : []);
                setRoulette(true);
            };

            const startRoll = () => {
                const pool = getRoulettePool();
                if (pool.length === 0 || scatterItems.length === 0) return;
                if (rouletteTimeoutRef.current) clearTimeout(rouletteTimeoutRef.current);
                setRouletteResult(null);

                // Snapshot exactly where each sprite is on screen right now (mid
                // wander) and lock it in as a static position, so the very next
                // step has a real, stable starting point to transition from —
                // rather than snapping straight to wherever the CSS animation's
                // "home" value happened to be.
                const container = stageRef.current;
                const frozen = {};
                if (container) {
                    const rect = container.getBoundingClientRect();
                    scatterItems.forEach(item => {
                        const el = rouletteItemRefs.current[item.id];
                        if (el) {
                            const r = el.getBoundingClientRect();
                            const cx = r.left + r.width / 2 - rect.left;
                            const cy = r.top + r.height / 2 - rect.top;
                            frozen[item.id] = {
                                x: clamp((cx / rect.width) * 100, 0, 100),
                                y: clamp((cy / rect.height) * 100, 0, 100)
                            };
                        }
                    });
                }
                setFrozenPositions(frozen);

                // Wait two paints: one to commit the frozen (non-animated, non-
                // transitioning) position, then start the transition to the
                // chest from that now-stable starting point.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        setRoulettePhase('gather');
                        const maxDelay = Math.max(0, ...scatterItems.map(it => it.gatherDelay));
                        const gatherDuration = maxDelay + 700;

                        rouletteTimeoutRef.current = setTimeout(() => {
                            setRoulettePhase('shake');
                            if (navigator.vibrate) navigator.vibrate(40);
                            rouletteTimeoutRef.current = setTimeout(() => {
                                const finalId = pool[Math.floor(Math.random() * pool.length)];
                                // Settle at rest (animation off, normal size) for one clean
                                // frame first, so the shrink/shift into "burst" has a stable
                                // starting point to transition from instead of snapping.
                                setRoulettePhase('settle');
                                requestAnimationFrame(() => {
                                    requestAnimationFrame(() => {
                                        setRoulettePhase('burst');
                                        setRouletteResult(finalId);
                                        setRollHistory(prev => [finalId, ...prev].slice(0, 5));
                                        if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
                                    });
                                });
                            }, 650);
                        }, gatherDuration);
                    });
                });
            };

            useEffect(() => {
                return () => { if (rouletteTimeoutRef.current) clearTimeout(rouletteTimeoutRef.current); };
            }, []);

            const toggle = (n, v) => {
                const id = n + '-' + v;
                setCollected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
                setMastered(p => p.filter(x => x !== id));
            };

            const longPress = (n, v) => {
                const id = n + '-' + v;
                const c = collected.includes(id);
                const m = mastered.includes(id);
                
                if (navigator.vibrate) navigator.vibrate(60);
                
                if (!c) { 
                    setCollected(p => [...p, id]); 
                    setMastered(p => [...p, id]); 
                }
                else if (!m) { 
                    setMastered(p => [...p, id]); 
                }
                else { 
                    setMastered(p => p.filter(x => x !== id)); 
                }
            };

            // Pointer Events fire exactly once per physical press across mouse,
            // touch, and pen (no duplicate/"ghost" mouse events like touch
            // handlers can trigger), which is what was causing a completed
            // long-press to be immediately undone by a delayed synthetic tap.
            const handlePointerDown = (e, n, v) => {
                e.preventDefault();
                const id = n + '-' + v;
                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }
                longPressFlag.current[id] = false;
                try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
                longPressTimers.current[id] = setTimeout(() => {
                    longPressFlag.current[id] = true;
                    longPress(n, v);
                }, 500);
            };

            const handlePointerUp = (e, n, v) => {
                const id = n + '-' + v;
                const isLongPress = longPressFlag.current[id];

                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }

                if (!isLongPress) {
                    toggle(n, v);
                }

                longPressFlag.current[id] = false;
            };

            // Pointer left the element or the gesture was cancelled (e.g. the OS
            // took over for a system gesture) — just clean up, don't toggle.
            const handlePointerCancel = (e, n, v) => {
                const id = n + '-' + v;
                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }
                longPressFlag.current[id] = false;
            };

            const bgColor = isMasterCollector 
                ? (dark ? '#2d1b4e' : '#fdf2f8')
                : (dark ? '#0f172a' : '#faf5ff');
            const textColor = isMasterCollector 
                ? (dark ? '#e2e8f0' : '#831843')
                : (dark ? '#e2e8f0' : '#4c1d95');
            const cardBg = isMasterCollector 
                ? (dark ? 'rgba(88, 28, 135, 0.3)' : 'rgba(236, 72, 153, 0.18)')
                : (dark ? 'rgba(30,41,59,0.4)' : 'rgba(192, 132, 250, 0.25)');
            const cardBorder = isMasterCollector 
                ? (dark ? 'rgba(168, 85, 247, 0.5)' : 'rgba(236, 72, 153, 0.55)')
                : (dark ? 'rgba(100,116,139,0.3)' : 'rgba(168, 85, 247, 0.6)');
            const accentColor = isMasterCollector ? '#a855f7' : '#06b6d4';
            const masteredAccent = isMasterCollector ? '#ec4899' : '#fbbf24';
            // Emoji glyphs (☀️🌙🎲✨) have their own fixed bright colors, so a pale
            // translucent tint (especially in light mode) washes them out. Solid,
            // in-theme pastels keep the accent-color identity while giving real contrast.
            const iconBg = isMasterCollector
                ? (dark ? 'rgba(168, 85, 247, 0.3)' : '#e9d5ff')
                : (dark ? 'rgba(6, 182, 212, 0.25)' : '#a5f3fc');
            const cardGlow = isMasterCollector ? '0 0 20px rgba(168, 85, 247, 0.45)' : 'none';
            // Soft ambient bloom behind titles — a static, non-animated glow using
            // the same gradient colors, applied via drop-shadow so it respects the
            // gradient-clipped text's actual glyph shapes rather than a rectangle.
            const titleGlow = 'drop-shadow(0 0 18px rgba(168, 85, 247, 0.35)) drop-shadow(0 0 32px rgba(6, 182, 212, 0.2))';

            if (roulette) {
                const pool = getRoulettePool();
                const resultInfo = rouletteResult ? splitId(rouletteResult) : null;
                const isBusy = roulettePhase === 'gather' || roulettePhase === 'shake' || roulettePhase === 'settle';
                const goBack = () => { resetRoulette(); setRoulette(false); };

                return <div style={{ width: '100%', height: '100dvh', background: bgColor, color: textColor, padding: '1.5rem 1rem', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', alignItems: 'center', overflow: 'hidden' }}>
                    <div style={{ width: '100%', maxWidth: '480px', display: 'flex', justifyContent: 'space-between', marginBottom: '0.75rem', flexShrink: 0 }}>
                        <button onClick={goBack} style={{ padding: '0.5rem 1rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>← Back</button>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button onClick={() => setDark(!dark)} style={{ padding: '0.5rem 1rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                            {masterCollectorUnlocked && <button onClick={() => setMasterCollectorActive(!masterCollectorActive)} style={{ padding: '0.5rem 1rem', background: masterCollectorActive ? '#a855f7' : iconBg, color: masterCollectorActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨</button>}
                        </div>
                    </div>

                    <h1 style={{ fontFamily: "'Anton', sans-serif", fontSize: '2.4rem', fontWeight: 400, letterSpacing: '0.02em', margin: '0 0 0.15rem 0', flexShrink: 0, textTransform: 'uppercase', filter: titleGlow, background: 'linear-gradient(90deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%)', backgroundClip: 'text', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', color: '#06b6d4' }}>Sprite Roulette</h1>
                    <div style={{ opacity: 0.7, marginBottom: '1.25rem', fontSize: '0.9rem', flexShrink: 0 }}>{pool.length} sprite{pool.length === 1 ? '' : 's'} in the pool{hasActiveFilters ? ' (filtered)' : ''}</div>

                    {pool.length === 0 ? (
                        <div style={{ background: cardBg, padding: '2rem', borderRadius: '1rem', border: `1px solid ${cardBorder}`, textAlign: 'center', maxWidth: '320px' }}>
                            {collected.length === 0 ? 'Collect a few sprites first, then come back to roll!' : 'No collected sprites match your current filters. Adjust filters on the home screen to roll.'}
                        </div>
                    ) : (
                        <>
                            <div ref={stageRef} style={{ position: 'relative', width: 'min(85vw, 420px)', height: 'min(85vw, 420px)', marginBottom: '1.25rem', flexShrink: 0 }}>
                                {/* Every collected sprite wanders the stage until Roll is pressed, then flies into the chest */}
                                {(roulettePhase === 'idle' || roulettePhase === 'gather') && scatterItems.map((item) => {
                                    const info = splitId(item.id);
                                    const isGathering = roulettePhase === 'gather';
                                    const frozen = frozenPositions[item.id];
                                    const baseX = frozen ? frozen.x : item.xPct;
                                    const baseY = frozen ? frozen.y : item.yPct;
                                    return (
                                        <div
                                            key={item.id}
                                            ref={el => { rouletteItemRefs.current[item.id] = el; }}
                                            style={{
                                                position: 'absolute',
                                                width: '42px',
                                                height: '42px',
                                                left: isGathering ? '50%' : `${baseX}%`,
                                                top: isGathering ? '50%' : `${baseY}%`,
                                                transform: `translate(-50%, -50%) scale(${isGathering ? 0.15 : 1})`,
                                                opacity: isGathering ? 0 : 1,
                                                animation: (!frozen && !isGathering) ? `roam ${item.roamDuration}s ease-in-out ${item.roamDelay}s infinite, spriteHop ${item.roamDuration}s ease-in-out ${item.roamDelay}s infinite` : 'none',
                                                transition: isGathering ? `left 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, top 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, transform 0.6s cubic-bezier(0.55,0,0.85,0.4) ${item.gatherDelay}ms, opacity 0.35s ease-in ${item.gatherDelay + 300}ms` : 'none',
                                                '--x0': `${item.xPct}%`, '--y0': `${item.yPct}%`,
                                                '--x1': `${item.wp[0].x}%`, '--y1': `${item.wp[0].y}%`,
                                                '--x2': `${item.wp[1].x}%`, '--y2': `${item.wp[1].y}%`,
                                                '--x3': `${item.wp[2].x}%`, '--y3': `${item.wp[2].y}%`
                                            }}
                                        >
                                            <img src={getImagePath(info.name, info.variant)} {...noCalloutImgProps} style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }} alt="" />
                                        </div>
                                    );
                                })}

                                {/* Chest wrapper handles shake + shrink/shift; the two images crossfade inside it so the closed→open swap isn't an instant pop */}
                                <div
                                    style={{
                                        position: 'absolute', top: '50%', left: '50%',
                                        transform: roulettePhase === 'burst' ? 'translate(calc(-50% - 19px), calc(-50% - 19px))' : 'translate(-50%, -50%)',
                                        width: roulettePhase === 'burst' ? '132px' : '150px',
                                        height: roulettePhase === 'burst' ? '132px' : '150px',
                                        transition: 'width 0.45s ease-out, height 0.45s ease-out, transform 0.45s ease-out',
                                        animation: roulettePhase === 'shake' ? 'chestShake 0.5s ease-in-out 2' : 'none',
                                        filter: roulettePhase === 'burst' ? `drop-shadow(0 0 20px ${masteredAccent})` : 'none'
                                    }}
                                >
                                    <img
                                        src={CHEST_CLOSED}
                                        {...noCalloutImgProps}
                                        style={{ ...noCalloutImgProps.style, position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', opacity: roulettePhase === 'burst' ? 0 : 1, transition: 'opacity 0.3s ease-out' }}
                                        alt="Loot chest"
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                    <img
                                        src={CHEST_OPEN}
                                        {...noCalloutImgProps}
                                        style={{ ...noCalloutImgProps.style, position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', opacity: roulettePhase === 'burst' ? 1 : 0, transition: 'opacity 0.3s ease-out' }}
                                        alt=""
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                </div>

                                {/* Burst flash + soft star sparkles + final reveal */}
                                {roulettePhase === 'burst' && resultInfo && (
                                    <>
                                        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: '200px', height: '200px', borderRadius: '50%', background: `radial-gradient(circle, ${masteredAccent}99 0%, transparent 70%)`, animation: 'burstFlash 0.6s ease-out forwards' }} />
                                        {[0, 1, 2, 3, 4, 5].map(i => (
                                            <div key={i} style={{ position: 'absolute', top: '50%', left: '50%', width: '10px', height: '10px', borderRadius: '50%', background: `radial-gradient(circle, ${masteredAccent} 0%, transparent 75%)`, filter: 'blur(1.5px)', '--rot': `${i * 60}deg`, animation: `sparkleFloat 1s ease-out ${i * 0.05}s forwards` }} />
                                        ))}
                                        <div style={{ position: 'absolute', top: '50%', left: '50%', width: '100px', height: '100px', animation: 'popInCentered 0.5s ease-out 0.15s both', filter: `drop-shadow(0 0 12px ${masteredAccent})` }}>
                                            <img src={getImagePath(resultInfo.name, resultInfo.variant)} {...noCalloutImgProps} style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }} alt="" />
                                        </div>
                                    </>
                                )}
                            </div>

                            <div style={{ textAlign: 'center', marginBottom: '0.5rem', minHeight: '2.4rem', flexShrink: 0, visibility: (roulettePhase === 'burst' && resultInfo) ? 'visible' : 'hidden', animation: (roulettePhase === 'burst' && resultInfo) ? 'popIn 0.4s ease-out 0.3s both' : 'none' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 700 }}>{resultInfo ? resultInfo.name : '\u00A0'}</div>
                                <div style={{ fontSize: '0.9rem', color: accentColor }}>{resultInfo ? resultInfo.variant : '\u00A0'}</div>
                            </div>

                            <button
                                onClick={roulettePhase === 'burst' ? resetToIdle : startRoll}
                                disabled={isBusy}
                                style={{
                                    padding: '0.75rem 2rem',
                                    flexShrink: 0,
                                    background: isBusy ? cardBg : masteredAccent,
                                    color: isBusy ? accentColor : 'white',
                                    border: 'none',
                                    borderRadius: '0.5rem',
                                    cursor: isBusy ? 'default' : 'pointer',
                                    fontWeight: 'bold',
                                    fontSize: '1rem',
                                    opacity: isBusy ? 0.7 : 1
                                }}
                            >
                                {roulettePhase === 'idle' ? 'Open Chest' : roulettePhase === 'burst' ? 'Roll Again' : roulettePhase === 'gather' ? 'Gathering...' : 'Opening...'}
                            </button>
                        </>
                    )}

                    {rollHistory.length > 0 && (
                        <div style={{ marginTop: '1.25rem', width: '100%', maxWidth: '420px', textAlign: 'center', flexShrink: 0, minHeight: 0, overflow: 'hidden' }}>
                            <div style={{ fontSize: '0.75rem', fontWeight: 600, opacity: 0.7, marginBottom: '0.6rem', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Last {rollHistory.length} roll{rollHistory.length === 1 ? '' : 's'}</div>
                            <div style={{ display: 'flex', justifyContent: 'center', gap: '0.75rem', flexWrap: 'wrap' }}>
                                {rollHistory.map((id, i) => {
                                    const h = splitId(id);
                                    return (
                                        <div key={i} style={{ width: '48px', textAlign: 'center' }}>
                                            <div style={{ position: 'relative', width: '48px', height: '48px', borderRadius: '0.5rem', overflow: 'visible' }}>
                                                <div style={{ width: '100%', height: '100%', borderRadius: '0.5rem', overflow: 'hidden', background: cardBg, border: `1px solid ${cardBorder}` }}>
                                                    <img src={getImagePath(h.name, h.variant)} {...noCalloutImgProps} style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }} alt="" />
                                                </div>
                                                <div style={{
                                                    position: 'absolute', top: '-6px', right: '-6px',
                                                    width: '17px', height: '17px', borderRadius: '50%',
                                                    background: accentColor, color: 'white',
                                                    fontSize: '0.6rem', fontWeight: 'bold',
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    border: `1.5px solid ${bgColor}`
                                                }}>
                                                    {i + 1}
                                                </div>
                                            </div>
                                            <div style={{ fontSize: '0.6rem', marginTop: '0.25rem', opacity: 0.7, overflowWrap: 'break-word' }}>{h.name}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>;
            }

            if (share) {
                return <div style={{ width: '100%', maxWidth: '1280px', margin: '0 auto', padding: '0.75rem 1rem', background: bgColor, color: textColor, height: '100dvh', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', flexShrink: 0 }}>
                        <button onClick={() => setShare(false)} style={{ padding: '0.4rem 0.8rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>← Back</button>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button onClick={() => setDark(!dark)} style={{ padding: '0.4rem 0.8rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                            {masterCollectorUnlocked && <button onClick={() => setMasterCollectorActive(!masterCollectorActive)} style={{ padding: '0.4rem 0.8rem', background: masterCollectorActive ? '#a855f7' : iconBg, color: masterCollectorActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨</button>}
                        </div>
                    </div>

                    <button
                        onClick={saveCollectionImage}
                        disabled={savingImage}
                        style={{
                            width: '100%', padding: '0.75rem', marginBottom: '0.6rem', borderRadius: '0.75rem',
                            border: 'none', cursor: savingImage ? 'default' : 'pointer', flexShrink: 0,
                            background: savingImage ? iconBg : 'linear-gradient(90deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%)',
                            color: savingImage ? accentColor : 'white',
                            fontWeight: 900, fontSize: '0.95rem', letterSpacing: '0.02em',
                            boxShadow: savingImage ? 'none' : '0 4px 16px rgba(168, 85, 247, 0.45)'
                        }}
                    >
                        {savingImage ? 'Generating image…' : '✨ Share Collection'}
                    </button>
                    
                    <div style={{ flexShrink: 0, margin: '1rem 0 0.75rem 0', display: 'flex', justifyContent: 'center' }}>
                        <svg viewBox="0 0 340 52" style={{ width: '100%', maxWidth: '340px', height: 'auto', display: 'block', filter: titleGlow }}>
                            <defs>
                                <linearGradient id="shareTitleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stopColor="#06b6d4" />
                                    <stop offset="50%" stopColor="#a855f7" />
                                    <stop offset="100%" stopColor="#ec4899" />
                                </linearGradient>
                            </defs>
                            <text x="50%" y="50%" dominantBaseline="central" textAnchor="middle" fontFamily="'Anton', sans-serif" fontSize="36" fontWeight="400" letterSpacing="1" fill="url(#shareTitleGradient)">
                                MY SPRITE VAULT
                            </text>
                        </svg>
                    </div>

                    {/* This wrapper is whatever space is actually left on THIS device.
                        The grid inside is measured against it and scaled down (never up)
                        to fit exactly — no clipping, no scrolling, on any screen size. */}
                    <div ref={gridWrapperRef} style={{ flex: 1, minHeight: 0, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', overflow: 'hidden' }}>
                        <div ref={captureRef} style={{ background: bgColor, width: '100%', transform: savingImage ? 'none' : `scale(${gridScale})`, transformOrigin: 'top center' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${shareColumns}, 1fr)`, gap: '1rem 0.75rem' }}>
                                {sprites.map(sp => {
                                    const collectedStatus = sp.v.map(vv => collected.includes(sp.name + '-' + vv));
                                    const masteredStatus = sp.v.map(vv => mastered.includes(sp.name + '-' + vv));
                                    const c = collectedStatus.filter(Boolean).length;
                                    
                                    return (
                                        <div key={sp.name} style={{ textAlign: 'center', minWidth: 0 }}>
                                            <CompositeImage spriteName={sp.name} variants={sp.v} collectedStatus={collectedStatus} masteredStatus={masteredStatus} />
                                            <div style={{ fontSize: '0.75rem', fontWeight: 600, marginTop: '0.3rem', overflowWrap: 'break-word', lineHeight: 1.15 }}>
                                                {sp.name}
                                            </div>
                                            <div style={{ fontSize: '0.65rem', color: accentColor, fontWeight: 500 }}>
                                                {c}/{sp.v.length}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>;
            }

            return <div style={{ width: '100%', background: bgColor, color: textColor, minHeight: '100vh', padding: '2rem 0' }}>
                {showMasterCollectorPopup && <MasterCollectorPopup onClose={() => setShowMasterCollectorPopup(false)} onEnable={() => setMasterCollectorActive(true)} />}
                <div style={{ width: '100%', maxWidth: '1280px', margin: '0 auto', padding: '0 2rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '2rem' }}>
                        <div />
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', alignItems: 'flex-end' }}>
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                <button onClick={() => setShare(true)} style={{ padding: '0.5rem 1rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }} title="↑ to screenshot full collection">↑</button>
                                <button onClick={openRoulette} style={{ padding: '0.5rem 1rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }} title="🎲 to roll a random collected sprite">🎲</button>
                            </div>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <div style={{ display: 'flex', border: `1.5px solid ${accentColor}`, borderRadius: '0.5rem', overflow: 'hidden' }}>
                                    {[['cozy', 'Cozy'], ['compact', 'Compact'], ['list', 'List']].map(([val, txt], i) => (
                                        <button
                                            key={val}
                                            onClick={() => setViewMode(val)}
                                            style={{
                                                padding: '0.5rem 0.7rem', border: 'none', cursor: 'pointer',
                                                borderLeft: i > 0 ? `1px solid ${viewMode === val ? 'rgba(255,255,255,0.4)' : accentColor}` : 'none',
                                                background: viewMode === val ? accentColor : 'transparent',
                                                color: viewMode === val ? 'white' : accentColor,
                                                fontWeight: 'bold', fontSize: '0.78rem'
                                            }}
                                        >
                                            {txt}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setDark(!dark)} style={{ padding: '0.5rem 1rem', background: iconBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                                {masterCollectorUnlocked && <button onClick={() => setMasterCollectorActive(!masterCollectorActive)} style={{ padding: '0.5rem 1rem', background: masterCollectorActive ? '#a855f7' : iconBg, color: masterCollectorActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨ Master Collector</button>}
                            </div>
                        </div>
                    </div>

                    <div style={{ background: cardBg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '2rem', border: `1px solid ${cardBorder}`, boxShadow: cardGlow }}>
                        <span style={{ color: accentColor, fontWeight: 'bold' }}>Tap</span> to collect • <span style={{ color: masteredAccent, fontWeight: 'bold' }}>long press</span> to master • <span style={{ color: accentColor, fontWeight: 'bold' }}>↑</span> to screenshot • <span style={{ color: accentColor, fontWeight: 'bold' }}>🎲</span> to roll a random Sprite
                    </div>

                    <h1 style={{ fontFamily: "'Anton', sans-serif", fontSize: '3rem', fontWeight: 400, letterSpacing: '0.02em', margin: '1rem 0', textAlign: 'center', textTransform: 'uppercase', filter: titleGlow, background: 'linear-gradient(90deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%)', backgroundSize: '100% 100%', backgroundClip: 'text', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', color: '#06b6d4' }}>
                        {isMasterCollector ? 'MASTER COLLECTOR' : 'SPRITE COLLECTION'}
                    </h1>
                    
                    <div style={{ background: cardBg, borderRadius: '1rem', border: `1px solid ${cardBorder}`, marginBottom: '2rem', boxShadow: cardGlow, overflow: 'hidden' }}>
                        <button
                            onClick={() => setStatsExpanded(e => !e)}
                            style={{
                                width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                padding: '1rem 1.5rem', background: 'transparent', border: 'none', cursor: 'pointer',
                                color: textColor, fontWeight: 900, fontSize: '1rem', textTransform: 'uppercase', letterSpacing: '0.03em'
                            }}
                        >
                            <span>Collection Status <span style={{ opacity: 0.6, fontWeight: 700, textTransform: 'none', letterSpacing: 'normal' }}>({col}/{tot} collected, {mas}/{tot} mastered)</span></span>
                            <span style={{ fontSize: '1.2rem', transform: statsExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}>▾</span>
                        </button>
                        {statsExpanded && (
                            <div style={{ padding: '0 2rem 2rem 2rem' }}>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '2rem' }}>
                                    <div style={{ textAlign: 'center' }}>
                                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Collected</div>
                                        <Pie col={col} tot={tot} r={40} col_val={accentColor} format="fraction" />
                                        {renderVariantChips(v => collected.filter(id => splitId(id).variant === v).length, 'fraction')}
                                    </div>
                                    <div style={{ textAlign: 'center' }}>
                                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Mastered</div>
                                        <Pie col={mas} tot={tot} r={40} col_val={masteredAccent} format="fraction" />
                                        {renderVariantChips(v => mastered.filter(id => splitId(id).variant === v).length, 'fraction')}
                                    </div>
                                    <div style={{ textAlign: 'center' }}>
                                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Progress</div>
                                        <Pie col={col} tot={tot} r={40} col_val={accentColor} format="percentage" />
                                        {renderVariantChips(v => collected.filter(id => splitId(id).variant === v).length, 'percentage')}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div style={{ background: cardBg, borderRadius: '1rem', border: `1px solid ${cardBorder}`, marginBottom: '2rem', boxShadow: cardGlow, overflow: 'hidden' }}>
                        <button
                            onClick={() => setFiltersExpanded(e => !e)}
                            style={{
                                width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                padding: '1rem 1.5rem', background: 'transparent', border: 'none', cursor: 'pointer',
                                color: textColor, fontWeight: 900, fontSize: '1rem', textTransform: 'uppercase', letterSpacing: '0.03em'
                            }}
                        >
                            <span>Filters <span style={{ opacity: 0.6, fontWeight: 700, textTransform: 'none', letterSpacing: 'normal' }}>{hasActiveFilters ? '(active)' : ''}</span></span>
                            <span style={{ fontSize: '1.2rem', transform: filtersExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}>▾</span>
                        </button>
                        {filtersExpanded && (
                            <div style={{ padding: '0 1.5rem 1.5rem 1.5rem' }}>
                                {renderStatusFilter('Collected', filterCollectedMode, setFilterCollectedMode, 'collected', 'Collected', 'uncollected', 'Uncollected', accentColor)}
                                {renderStatusFilter('Mastered', filterMasteredMode, setFilterMasteredMode, 'mastered', 'Mastered', 'unmastered', 'Unmastered', masteredAccent)}

                                <div style={{ fontSize: '0.7rem', fontWeight: 700, opacity: 0.6, marginBottom: '0.4rem', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Variant</div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                                    {ALL_VARIANTS.map(v => (
                                        <button
                                            key={v}
                                            onClick={() => toggleVariantFilter(v)}
                                            style={{
                                                padding: '0.5rem 0.9rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold', fontSize: '0.85rem',
                                                background: filterVariants.includes(v) ? accentColor : 'transparent',
                                                color: filterVariants.includes(v) ? 'white' : accentColor,
                                                border: `1.5px solid ${accentColor}`
                                            }}
                                        >
                                            {v}
                                        </button>
                                    ))}
                                    {hasActiveFilters && (
                                        <button onClick={clearFilters} style={{ padding: '0.5rem 0.9rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold', fontSize: '0.85rem', background: 'transparent', color: textColor, border: `1.5px dashed ${cardBorder}`, opacity: 0.75 }}>
                                            ✕ Clear filters
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {listView ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                            {sprites.map(sp => {
                                const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                                const allMastered = sp.v.length > 0 && m === sp.v.length;
                                const anyVariantMatches = sp.v.some(vv => matchesFilters(vv, collected.includes(sp.name + '-' + vv), mastered.includes(sp.name + '-' + vv)));
                                if (!anyVariantMatches) return null;
                                return (
                                    <div key={sp.name} style={{ background: cardBg, padding: '0.4rem 0.6rem', borderRadius: '0.6rem', border: allMastered ? `2px solid ${masteredAccent}` : `1px solid ${cardBorder}`, display: 'flex', alignItems: 'center', gap: '0.6rem', boxShadow: isMasterCollector ? cardGlow : 'none' }}>
                                        <div style={{ width: '38px', height: '38px', borderRadius: '0.4rem', overflow: 'hidden', flexShrink: 0, background: 'rgba(0,0,0,0.1)' }}>
                                            <img
                                                src={getImagePath(sp.name, 'Base')}
                                                {...noCalloutImgProps}
                                                style={{ ...noCalloutImgProps.style, width: '100%', height: '100%', objectFit: 'contain' }}
                                                alt="Base"
                                                onError={(e) => { e.target.style.display = 'none'; }}
                                            />
                                        </div>
