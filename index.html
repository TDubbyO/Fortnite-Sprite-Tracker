<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite RUNNERS Sprite Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        @keyframes sparkle { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0) translateY(-20px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .dark-bg { background: linear-gradient(to bottom right, #0f172a, #1e1b4b, #0f172a); color: #e2e8f0; min-height: 100vh; }
        .light-bg { background: linear-gradient(to bottom right, #f8fafc, #f1e5e4, #f8fafc); color: #1e293b; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }
        .header { margin-bottom: 3rem; }
        .title { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #06b6d4, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.125rem; opacity: 0.7; margin-bottom: 2rem; }
        .btn-group { display: flex; gap: 0.75rem; margin-bottom: 3rem; }
        .btn { padding: 0.75rem; border-radius: 9999px; border: none; cursor: pointer; transition: all 0.3s; font-size: 1rem; }
        .btn-dark { background: rgba(51, 65, 85, 0.6); color: #60a5fa; }
        .btn-dark:hover { background: rgba(30, 41, 59, 0.8); }
        .btn-light { background: rgba(203, 213, 225, 0.6); color: #3b82f6; }
        .btn-light:hover { background: rgba(148, 163, 184, 0.6); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .stat-box { padding: 2rem; border-radius: 1rem; border: 1px solid rgba(100, 116, 139, 0.3); }
        .dark-stat { background: rgba(30, 41, 59, 0.4); }
        .light-stat { background: rgba(255, 255, 255, 0.6); }
        .stat-label { font-size: 1.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; opacity: 0.8; }
        .sprite-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .sprite-card { padding: 1.5rem; border-radius: 0.75rem; border: 1px solid rgba(100, 116, 139, 0.3); position: relative; }
        .dark-card { background: rgba(30, 41, 59, 0.4); }
        .light-card { background: rgba(255, 255, 255, 0.6); }
        .sprite-name { font-size: 1.125rem; font-weight: 700; margin-bottom: 1rem; }
        .variant-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-top: 1rem; }
        .variant-btn { padding: 0.75rem; border-radius: 0.5rem; border: 2px solid; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 0.9rem; color: white; }
        .variant-btn:active { transform: scale(0.95); }
        .instructions { padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; font-size: 0.875rem; border: 1px solid rgba(100, 116, 139, 0.3); }
        .dark-instructions { background: rgba(30, 41, 59, 0.3); }
        .light-instructions { background: rgba(203, 213, 225, 0.3); }
        svg { max-width: 100%; height: auto; }
        .progress-circle { width: 80px; height: 80px; }
        .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .share-sprite { padding: 1rem; border-radius: 0.5rem; text-align: center; font-size: 0.75rem; }
        .share-variants { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.25rem; }
        .share-variant { width: 20px; height: 20px; border-radius: 0.25rem; border: 2px solid; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const spriteTypes = [
            { name: 'Water', color: '#3b82f6', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Earth', color: '#16a34a', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fire', color: '#ef4444', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Duck', color: '#facc15', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Ghost', color: '#cbd5e1', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Dream', color: '#a855f7', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Demon', color: '#b91c1c', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Punk', color: '#db2777', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'King', color: '#b45309', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Burnt Peanut', color: '#78350f', variants: ['Base'] },
            { name: 'Zero Point', color: '#6d28d9', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fishy', color: '#f97316', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Striker', color: '#000000', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Aura', color: '#ffffff', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Boss', color: '#dc2626', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Grim', color: '#312e81', variants: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
        ];
 
        const FilledPie = ({ collected, total, radius, color, isDark }) => {
            const percentage = total > 0 ? (collected / total) * 100 : 0;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference * (1 - percentage / 100);
            const id = `pie-${Math.random()}`;
            return (
                <svg width={radius * 2 + 20} height={radius * 2 + 20} viewBox={`0 0 ${radius * 2 + 20} ${radius * 2 + 20}`}>
                    <defs><clipPath id={id}><circle cx={radius + 10} cy={radius + 10} r={radius} /></clipPath></defs>
                    <circle cx={radius + 10} cy={radius + 10} r={radius} fill={color} opacity="0.2" />
                    <circle cx={radius + 10} cy={radius + 10} r={radius} fill="none" stroke={color} strokeWidth={radius * 0.3} strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.3s' }} />
                    <text x={radius + 10} y={radius + 13} textAnchor="middle" fontSize={radius * 0.7} fontWeight="bold" fill={color}>{Math.round(percentage)}%</text>
                    {percentage > 0 && <text x={radius + 10} y={radius + 13} textAnchor="middle" fontSize={radius * 0.7} fontWeight="bold" fill={isDark ? 'white' : '#1e293b'} clipPath={`url(#${id})`}>{Math.round(percentage)}%</text>}
                </svg>
            );
        };
 
        function SpriteTracker() {
            const [collected, setCollected] = useState(() => JSON.parse(localStorage.getItem('spriteCollected') || '[]'));
            const [mastered, setMastered] = useState(() => JSON.parse(localStorage.getItem('spriteMastered') || '[]'));
            const [isDark, setIsDark] = useState(() => JSON.parse(localStorage.getItem('isDark') || 'true'));
            const [showShare, setShowShare] = useState(false);
            const longPress = useRef(false);
 
            useEffect(() => { localStorage.setItem('spriteCollected', JSON.stringify(collected)); }, [collected]);
            useEffect(() => { localStorage.setItem('spriteMastered', JSON.stringify(mastered)); }, [mastered]);
            useEffect(() => { localStorage.setItem('isDark', JSON.stringify(isDark)); }, [isDark]);
 
            const totalItems = spriteTypes.reduce((sum, s) => sum + s.variants.length, 0);
            const totalCollected = collected.length;
            const totalMastered = mastered.length;
            const totalPercent = Math.round((totalCollected / totalItems) * 100);
 
            const toggleVariant = (spriteName, variant) => {
                const id = `${spriteName}-${variant}`;
                setCollected(prev => prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]);
            };
 
            const handleLongPress = (spriteName, variant) => {
                const id = `${spriteName}-${variant}`;
                const isCollected = collected.includes(id);
                const isMastered = mastered.includes(id);
                
                if (!isCollected) {
                    setCollected(prev => [...prev, id]);
                    setMastered(prev => [...prev, id]);
                } else if (!isMastered) {
                    setMastered(prev => [...prev, id]);
                } else {
                    setMastered(prev => prev.filter(s => s !== id));
                }
            };
 
            const handleTouchStart = (e, spriteName, variant) => {
                longPress.current = false;
                const timeout = setTimeout(() => {
                    longPress.current = true;
                    handleLongPress(spriteName, variant);
                }, 500);
                e.currentTarget.pressTimeout = timeout;
            };
 
            const handleTouchEnd = (e, spriteName, variant) => {
                clearTimeout(e.currentTarget.pressTimeout);
                if (!longPress.current) toggleVariant(spriteName, variant);
            };
 
            const bgClass = isDark ? 'dark-bg' : 'light-bg';
            const cardClass = isDark ? 'dark-card' : 'light-card';
            const statClass = isDark ? 'dark-stat' : 'light-stat';
            const instructClass = isDark ? 'dark-instructions' : 'light-instructions';
 
            if (showShare) {
                return (
                    <div className={bgClass}>
                        <div className="container">
                            <button onClick={() => setShowShare(false)} style={{ background: 'rgba(100, 116, 139, 0.5)', color: isDark ? '#e2e8f0' : '#1e293b', padding: '0.5rem 1rem', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', marginBottom: '1rem' }}>← Back</button>
                            <h1 style={{ fontSize: '2.25rem', fontWeight: 900, marginBottom: '0.5rem', background: 'linear-gradient(to right, #06b6d4, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>RUNNERS</h1>
                            <p style={{ fontSize: '0.875rem', opacity: 0.7, marginBottom: '1.5rem' }}>{totalPercent}% • {totalCollected}/{totalItems}</p>
                            <div className="share-grid">
                                {spriteTypes.map(sprite => (
                                    <div key={sprite.name} className={`share-sprite ${cardClass}`}>
                                        <div style={{ fontSize: '0.75rem', fontWeight: 700, marginBottom: '0.5rem' }}>{sprite.name}</div>
                                        <div className="share-variants">
                                            {sprite.variants.map(v => {
                                                const id = `${sprite.name}-${v}`;
                                                const isCol = collected.includes(id);
                                                const colors = { Base: '#94a3b8', Gold: '#eab308', Gummy: '#ec4899', Galaxy: '#6366f1' };
                                                return <div key={v} className="share-variant" style={{ borderColor: colors[v], backgroundColor: isCol ? colors[v] : 'transparent' }} />;
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
 
            return (
                <div className={bgClass}>
                    <div className="container">
                        <div className={`instructions ${instructClass}`}>
                            <strong style={{ color: '#06b6d4' }}>Tap</strong> to collect • <strong style={{ color: '#fbbf24' }}>long press</strong> to master
                        </div>
 
                        <div className="header">
                            <h1 className="title">RUNNERS</h1>
                            <p className="subtitle">Sprite Collection Tracker</p>
                            <div className="btn-group">
                                <button className={`btn ${isDark ? 'btn-dark' : 'btn-light'}`} onClick={() => setShowShare(true)}>↑ Screenshot</button>
                                <button className={`btn ${isDark ? 'btn-dark' : 'btn-light'}`} onClick={() => setIsDark(!isDark)}>{isDark ? '☀️' : '🌙'}</button>
                            </div>
                        </div>
 
                        <div className="stats-grid">
                            <div className={`stat-box ${statClass}`}>
                                <div className="stat-label">Collected</div>
                                <FilledPie collected={totalCollected} total={totalItems} radius={40} color="#06b6d4" isDark={isDark} />
                                <div style={{ marginTop: '1rem', fontSize: '0.875rem', opacity: 0.7 }}>{totalCollected}/{totalItems}</div>
                            </div>
                            <div className={`stat-box ${statClass}`}>
                                <div className="stat-label">Mastered</div>
                                <FilledPie collected={totalMastered} total={totalItems} radius={40} color="#fbbf24" isDark={isDark} />
                                <div style={{ marginTop: '1rem', fontSize: '0.875rem', opacity: 0.7 }}>{totalMastered}/{totalItems}</div>
                            </div>
                            <div className={`stat-box ${statClass}`}>
                                <div className="stat-label">Progress</div>
                                <FilledPie collected={totalCollected} total={totalItems} radius={40} color="#06b6d4" isDark={isDark} />
                                <div style={{ marginTop: '1rem', fontSize: '0.875rem', opacity: 0.7 }}>{totalPercent}%</div>
                            </div>
                        </div>
 
                        <div className="sprite-grid">
                            {spriteTypes.map(sprite => {
                                const stats = { collected: 0, mastered: 0, total: sprite.variants.length };
                                sprite.variants.forEach(v => {
                                    const id = `${sprite.name}-${v}`;
                                    if (collected.includes(id)) stats.collected++;
                                    if (mastered.includes(id)) stats.mastered++;
                                });
                                
                                return (
                                    <div key={sprite.name} className={`sprite-card ${cardClass}`}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                            <h3 className="sprite-name">{sprite.name}</h3>
                                            {stats.mastered === stats.total && stats.total > 0 && <span style={{ fontSize: '1.5rem' }}>★</span>}
                                        </div>
                                        <div style={{ fontSize: '0.875rem', opacity: 0.7, marginBottom: '1rem' }}>{stats.collected}/{stats.total}</div>
                                        <div className="variant-grid">
                                            {sprite.variants.map(variant => {
                                                const id = `${sprite.name}-${variant}`;
                                                const isCol = collected.includes(id);
                                                const isMas = mastered.includes(id);
                                                const colors = { Base: '#94a3b8', Gold: '#eab308', Gummy: '#ec4899', Galaxy: '#6366f1' };
                                                const color = colors[variant];
                                                return (
                                                    <button
                                                        key={variant}
                                                        className="variant-btn"
                                                        style={{
                                                            borderColor: color,
                                                            backgroundColor: isCol ? color : 'transparent',
                                                            opacity: isCol ? 1 : 0.4
                                                        }}
                                                        onTouchStart={(e) => handleTouchStart(e, sprite.name, variant)}
                                                        onTouchEnd={(e) => handleTouchEnd(e, sprite.name, variant)}
                                                        onClick={() => !longPress.current && toggleVariant(sprite.name, variant)}
                                                    >
                                                        {variant}{isMas ? ' ★' : ''}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }
 
        ReactDOM.render(<SpriteTracker />, document.getElementById('root'));
    </script>
</body>
</html>
