<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite RUNNERS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; -webkit-user-select: none; user-select: none;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const sprites = [
            { name: 'Water', color: '#3b82f6', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Earth', color: '#16a34a', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fire', color: '#ef4444', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Duck', color: '#facc15', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Ghost', color: '#cbd5e1', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Dream', color: '#a855f7', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Demon', color: '#b91c1c', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Punk', color: '#db2777', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'King', color: '#b45309', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Burnt Peanut', color: '#78350f', v: ['Base'] },
            { name: 'Zero Point', color: '#6d28d9', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fishy', color: '#f97316', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Striker', color: '#000000', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Aura', color: '#ffffff', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Boss', color: '#dc2626', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Grim', color: '#312e81', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
        ];

        const getImagePath = (spriteName, variant) => {
            const nameMap = {
                'Water': 'Water', 'Earth': 'Earth', 'Fire': 'Fire', 'Duck': 'Duck',
                'Ghost': 'Ghost', 'Dream': 'Dream', 'Demon': 'Demon', 'Punk': 'Punk',
                'King': 'King', 'Burnt Peanut': 'Burntpeanut', 'Zero Point': 'Zeropoint',
                'Fishy': 'Fishy', 'Striker': 'Striker', 'Aura': 'Aura', 'Boss': 'Boss', 'Grim': 'Grim'
            };
            const mappedName = nameMap[spriteName];
            return `/images/${mappedName}-${variant.toLowerCase()}.webp`;
        };

        const Pie = ({ col, tot, r, col_val, format }) => {
            const pct = tot > 0 ? (col / tot) * 100 : 0;
            const id = `m${Math.random().toString(36).substr(2, 9)}`;
            const displayText = format === 'fraction' ? `${col}/${tot}` : `${Math.round(pct)}%`;
            
            const rad = (pct * 360) / 100;
            const isLarge = pct > 50 ? 1 : 0;
            const x1 = r + 10 + r * Math.cos(-Math.PI / 2);
            const y1 = r + 10 + r * Math.sin(-Math.PI / 2);
            const x2 = r + 10 + r * Math.cos(-Math.PI / 2 + (rad * Math.PI) / 180);
            const y2 = r + 10 + r * Math.sin(-Math.PI / 2 + (rad * Math.PI) / 180);
            const pathData = `M ${r + 10} ${r + 10} L ${x1} ${y1} A ${r} ${r} 0 ${isLarge} 1 ${x2} ${y2} Z`;
            
            return (
                <svg width={r * 2 + 20} height={r * 2 + 20} viewBox={`0 0 ${r * 2 + 20} ${r * 2 + 20}`} style={{ maxWidth: '100%' }}>
                    <defs>
                        <mask id={id}>
                            <rect width={r * 2 + 20} height={r * 2 + 20} fill="black" />
                            <path d={pathData} fill="white" />
                        </mask>
                    </defs>
                    <circle cx={r + 10} cy={r + 10} r={r} fill={col_val} opacity="0.15" />
                    <path d={pathData} fill={col_val} />
                    <text x={r + 10} y={r + 16} textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill={col_val}>{displayText}</text>
                    <text x={r + 10} y={r + 16} textAnchor="middle" fontSize={r * 0.55} fontWeight="bold" fill="white" mask={`url(#${id})`}>{displayText}</text>
                </svg>
            );
        };

        const SpriteWheel = ({ col, tot }) => {
            const r = 18;
            const pct = tot > 0 ? (col / tot) * 100 : 0;
            const circ = 2 * Math.PI * r;
            const off = circ * (1 - pct / 100);
            const col_val = '#06b6d4';
            
            return (
                <svg width="50" height="50" viewBox="0 0 50 50" style={{ position: 'absolute', top: '8px', right: '8px' }}>
                    <circle cx="25" cy="25" r={r} fill="none" stroke={col_val} strokeWidth="2.5" opacity="0.2" />
                    <circle cx="25" cy="25" r={r} fill="none" stroke={col_val} strokeWidth="2.5" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.3s', transform: 'rotate(-90deg)', transformOrigin: '25px 25px' }} />
                    <text x="25" y="30" textAnchor="middle" fontSize="11" fontWeight="bold" fill={col_val}>{col}/{tot}</text>
                </svg>
            );
        };

        const MythicPopup = ({ onClose, onEnable }) => (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                <div style={{ background: 'linear-gradient(135deg, #1a0033, #330066)', padding: '3rem 2rem', borderRadius: '1rem', textAlign: 'center', maxWidth: '400px', border: '2px solid #a855f7' }}>
                    <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>✨</div>
                    <h2 style={{ color: '#a855f7', fontSize: '2rem', fontWeight: 900, margin: '1rem 0' }}>MYTHIC!</h2>
                    <p style={{ color: '#e2e8f0', fontSize: '1rem', marginBottom: '2rem' }}>All 61 sprites mastered!</p>
                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center' }}>
                        <button onClick={onClose} style={{ padding: '0.75rem 1.5rem', background: 'rgba(255,255,255,0.2)', color: 'white', border: '1px solid #a855f7', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Later</button>
                        <button onClick={() => { onEnable(); onClose(); }} style={{ padding: '0.75rem 1.5rem', background: '#a855f7', color: 'white', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>Activate ✨</button>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [collected, setCollected] = useState(() => JSON.parse(localStorage.getItem('c') || '[]'));
            const [mastered, setMastered] = useState(() => JSON.parse(localStorage.getItem('m') || '[]'));
            const [share, setShare] = useState(false);
            const [dark, setDark] = useState(() => JSON.parse(localStorage.getItem('t') || 'true'));
            const [mythicSeen, setMythicSeen] = useState(() => JSON.parse(localStorage.getItem('mythic') || 'false'));
            const [showMythicPopup, setShowMythicPopup] = useState(false);
            const [mythicActive, setMythicActive] = useState(() => JSON.parse(localStorage.getItem('mythicActive') || 'false'));
            const longPressTimers = useRef({});
            const longPressFlag = useRef({});

            useEffect(() => { localStorage.setItem('c', JSON.stringify(collected)); }, [collected]);
            useEffect(() => { localStorage.setItem('m', JSON.stringify(mastered)); }, [mastered]);
            useEffect(() => { localStorage.setItem('t', JSON.stringify(dark)); }, [dark]);
            useEffect(() => { localStorage.setItem('mythic', JSON.stringify(mythicSeen)); }, [mythicSeen]);
            useEffect(() => { localStorage.setItem('mythicActive', JSON.stringify(mythicActive)); }, [mythicActive]);

            const tot = 61;
            const col = collected.length;
            const mas = mastered.length;
            const mythicUnlocked = mas === tot && tot > 0;
            const isMythic = mythicUnlocked && mythicActive;

            useEffect(() => {
                if (mythicUnlocked && !mythicSeen) {
                    setMythicSeen(true);
                    setShowMythicPopup(true);
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100, 50, 200]);
                    }
                }
            }, [mythicUnlocked, mythicSeen]);

            useEffect(() => {
                if (mythicActive && mas < tot) {
                    setMythicActive(false);
                }
            }, [mas, tot, mythicActive]);

            const CompositeImage = ({ spriteName, variants }) => {
                const sliceWidth = 25;
                return (
                    <div style={{ display: 'flex', width: '100%', height: '100%', gap: 0 }}>
                        {variants.map((variant, idx) => (
                            <div key={variant} style={{ flex: 1, overflow: 'hidden', background: 'rgba(0,0,0,0.05)' }}>
                                <img 
                                    src={getImagePath(spriteName, variant)} 
                                    style={{ 
                                        width: '400%',
                                        height: '100%',
                                        objectFit: 'cover',
                                        marginLeft: `-${idx * 100}%`
                                    }} 
                                    alt={variant}
                                />
                            </div>
                        ))}
                    </div>
                );
            };

            const toggle = (n, v) => {
                const id = n + '-' + v;
                setCollected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
                setMastered(p => p.filter(x => x !== id));
            };

            const longPress = (n, v) => {
                const id = n + '-' + v;
                const c = collected.includes(id);
                const m = mastered.includes(id);
                
                if (navigator.vibrate) navigator.vibrate(60);
                
                if (!c) { 
                    setCollected(p => [...p, id]); 
                    setMastered(p => [...p, id]); 
                }
                else if (!m) { 
                    setMastered(p => [...p, id]); 
                }
                else { 
                    setMastered(p => p.filter(x => x !== id)); 
                }
            };

            const handleStart = (e, n, v) => {
                if (e.touches) e.preventDefault();
                const id = n + '-' + v;
                longPressFlag.current[id] = false;
                longPressTimers.current[id] = setTimeout(() => {
                    longPressFlag.current[id] = true;
                    longPress(n, v);
                }, 500);
            };

            const handleEnd = (e, n, v) => {
                if (e.touches) e.preventDefault();
                const id = n + '-' + v;
                const isLongPress = longPressFlag.current[id];
                
                if (longPressTimers.current[id]) {
                    clearTimeout(longPressTimers.current[id]);
                    delete longPressTimers.current[id];
                }
                
                if (!isLongPress) {
                    toggle(n, v);
                }
                
                longPressFlag.current[id] = false;
            };

            const bgColor = isMythic 
                ? (dark ? '#2d1b4e' : '#f3e8ff')
                : (dark ? '#0f172a' : '#f8fafc');
            const textColor = isMythic 
                ? (dark ? '#e2e8f0' : '#5b21b6')
                : (dark ? '#e2e8f0' : '#1e293b');
            const cardBg = isMythic 
                ? (dark ? 'rgba(88, 28, 135, 0.3)' : 'rgba(192, 132, 250, 0.15)')
                : (dark ? 'rgba(30,41,59,0.4)' : 'rgba(226,232,240,0.5)');
            const cardBorder = isMythic 
                ? (dark ? 'rgba(168, 85, 247, 0.5)' : 'rgba(168, 85, 247, 0.4)')
                : (dark ? 'rgba(100,116,139,0.3)' : 'rgba(148,163,184,0.3)');
            const accentColor = isMythic ? '#a855f7' : '#06b6d4';

            if (share) {
                return <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '2rem', background: bgColor, color: textColor, minHeight: '100vh' }}>
                    <button onClick={() => setShare(false)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer', marginBottom: '2rem' }}>← Back</button>
                    
                    <h2 style={{ fontSize: '1.125rem', fontWeight: 700, margin: '0 0 1.5rem 0' }}>Full collection</h2>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '1rem' }}>
                        {sprites.map(sp => {
                            const c = sp.v.filter(vv => collected.includes(sp.name + '-' + vv)).length;
                            const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                            const isC = c > 0;
                            const isM = m === sp.v.length && sp.v.length > 0;
                            return (
                                <div key={sp.name} style={{ textAlign: 'center' }}>
                                    <div style={{ width: '100%', height: '100px', marginBottom: '0.75rem', borderRadius: '0.5rem', overflow: 'hidden', background: 'rgba(0,0,0,0.1)', opacity: isC ? 1 : 0.25, filter: isM ? 'drop-shadow(0 0 6px #fbbf24)' : 'none', transition: 'all 0.3s' }}>
                                        <CompositeImage spriteName={sp.name} variants={sp.v} />
                                    </div>
                                    <div style={{ fontSize: '0.875rem', fontWeight: 600, marginBottom: '0.25rem' }}>
                                        {sp.name}
                                    </div>
                                    <div style={{ fontSize: '0.8125rem', color: accentColor, fontWeight: 500 }}>
                                        {c}/{sp.v.length}{isM ? ' · ✨' : ''}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>;
            }

            return <div style={{ background: bgColor, color: textColor, minHeight: '100vh', padding: '2rem 0' }}>
                {showMythicPopup && <MythicPopup onClose={() => setShowMythicPopup(false)} onEnable={() => setMythicActive(true)} />}
                <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '0 2rem' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '2rem' }}>
                        <div />
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', alignItems: 'flex-end' }}>
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                <button onClick={() => setShare(true)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }} title="Screenshot your collection">↑</button>
                                <button onClick={() => setDark(!dark)} style={{ padding: '0.5rem 1rem', background: cardBg, color: accentColor, border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>{dark ? '☀️' : '🌙'}</button>
                            </div>
                            {mythicUnlocked && <button onClick={() => setMythicActive(!mythicActive)} style={{ padding: '0.5rem 1rem', background: mythicActive ? '#a855f7' : cardBg, color: mythicActive ? 'white' : accentColor, border: `2px solid #a855f7`, borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 'bold' }}>✨ Mythic</button>}
                        </div>
                    </div>

                    <div style={{ background: cardBg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '2rem', border: `1px solid ${cardBorder}` }}>
                        <span style={{ color: accentColor, fontWeight: 'bold' }}>Tap</span> to collect • <span style={{ color: '#fbbf24', fontWeight: 'bold' }}>long press</span> to master • <span style={{ color: accentColor, fontWeight: 'bold' }}>↑</span> to screenshot
                    </div>

                    <h1 style={{ fontSize: '3rem', fontWeight: 900, margin: '1rem 0', background: isMythic ? 'linear-gradient(90deg, #a855f7, #ec4899, #a855f7)' : 'linear-gradient(90deg, #06b6d4, #a855f7, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                        {isMythic ? 'MYTHIC' : 'RUNNERS'}
                    </h1>
                    
                    <div style={{ background: cardBg, padding: '2rem', borderRadius: '1rem', border: `1px solid ${cardBorder}`, marginBottom: '3rem' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '2rem' }}>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Collected</div>
                                <Pie col={col} tot={tot} r={40} col_val="#06b6d4" format="fraction" />
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Mastered</div>
                                <Pie col={mas} tot={tot} r={40} col_val="#fbbf24" format="fraction" />
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Progress</div>
                                <Pie col={col} tot={tot} r={40} col_val={accentColor} format="percentage" />
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '1.5rem' }}>
                        {sprites.map(sp => {
                            const c = sp.v.filter(vv => collected.includes(sp.name + '-' + vv)).length;
                            const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                            return (
                                <div key={sp.name} style={{ background: cardBg, padding: '1.5rem', borderRadius: '0.75rem', border: `1px solid ${cardBorder}`, position: 'relative' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                        <div style={{ fontSize: '1.125rem', fontWeight: 700 }}>
                                            {sp.name}
                                        </div>
                                        <div style={{ fontSize: '0.875rem', fontWeight: 600, color: accentColor }}>
                                            {c}/{sp.v.length}
                                        </div>
                                    </div>
                                    
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.75rem' }}>
                                        {sp.v.map(vv => {
                                            const id = sp.name + '-' + vv;
                                            const isC = collected.includes(id);
                                            const isM = mastered.includes(id);
                                            return (
                                                <div
                                                    key={vv}
                                                    onContextMenu={(e) => e.preventDefault()}
                                                    onTouchStart={(e) => handleStart(e, sp.name, vv)}
                                                    onTouchEnd={(e) => handleEnd(e, sp.name, vv)}
                                                    onMouseDown={(e) => handleStart(e, sp.name, vv)}
                                                    onMouseUp={(e) => handleEnd(e, sp.name, vv)}
                                                    style={{
                                                        width: '100%',
                                                        height: '120px',
                                                        borderRadius: '0.5rem',
                                                        overflow: 'hidden',
                                                        opacity: isC ? 1 : 0.3,
                                                        cursor: 'pointer',
                                                        transition: 'all 0.3s',
                                                        background: 'rgba(0,0,0,0.1)',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center'
                                                    }}
                                                >
                                                    <img 
                                                        src={getImagePath(sp.name, vv)} 
                                                        style={{ 
                                                            width: '90%', 
                                                            height: '90%', 
                                                            objectFit: 'contain',
                                                            filter: isM ? 'drop-shadow(0 0 6px #fbbf24)' : 'none'
                                                        }} 
                                                        alt={vv}
                                                        onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
