                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.35rem', width: '100px', flexShrink: 0 }}>
                                            <span style={{ width: '7px', height: '7px', borderRadius: '50%', background: sp.color, flexShrink: 0 }} />
                                            <span title={sp.name} style={{ fontSize: '0.72rem', fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{sp.name}</span>
                                        </div>
                                        <div style={{ flex: 1, display: 'flex', height: '28px', borderRadius: '0.4rem', overflow: 'hidden', border: `1px solid ${cardBorder}` }}>
                                            {ALL_VARIANTS.map((variant, i) => {
                                                const applicable = sp.v.includes(variant);
                                                // Relying on the parent's overflow:hidden to round the end
                                                // segments isn't reliable once a segment has its own nested
                                                // layers (the mastered trim/buffer/fill), so the end corners
                                                // are rounded explicitly here instead, at every layer.
                                                const isFirst = i === 0;
                                                const isLast = i === ALL_VARIANTS.length - 1;
                                                const endRadius = {
                                                    borderTopLeftRadius: isFirst ? '0.4rem' : 0,
                                                    borderBottomLeftRadius: isFirst ? '0.4rem' : 0,
                                                    borderTopRightRadius: isLast ? '0.4rem' : 0,
                                                    borderBottomRightRadius: isLast ? '0.4rem' : 0
                                                };

                                                // A variant this sprite doesn't have gets a permanent
                                                // hatched pattern in its fixed slot — visually distinct
                                                // from "uncollected" grey and never tappable.
                                                if (!applicable) {
                                                    return (
                                                        <div
                                                            key={variant}
                                                            title={`${variant} — not part of this sprite`}
                                                            style={{
                                                                flex: 1, height: '100%',
                                                                borderLeft: i > 0 ? `1px solid ${cardBorder}` : 'none',
                                                                background: 'repeating-linear-gradient(45deg, rgba(148,163,184,0.22), rgba(148,163,184,0.22) 4px, transparent 4px, transparent 8px)',
                                                                ...endRadius
                                                            }}
                                                        />
                                                    );
                                                }

                                                const id = sp.name + '-' + variant;
                                                const isC = collected.includes(id);
                                                const isM = mastered.includes(id);
                                                const isFilteredOut = !matchesFilters(variant, isC, isM);
                                                const color = VARIANT_COLORS[variant] || '#94a3b8';

                                                return (
                                                    <div
                                                        key={variant}
                                                        title={variant}
                                                        onContextMenu={(e) => e.preventDefault()}
                                                        onPointerDown={(e) => handlePointerDown(e, sp.name, variant)}
                                                        onPointerUp={(e) => handlePointerUp(e, sp.name, variant)}
                                                        onPointerCancel={(e) => handlePointerCancel(e, sp.name, variant)}
                                                        onPointerLeave={(e) => handlePointerCancel(e, sp.name, variant)}
                                                        style={{
                                                            flex: 1, height: '100%', boxSizing: 'border-box',
                                                            borderLeft: i > 0 ? `1px solid ${cardBorder}` : 'none',
                                                            cursor: 'pointer', touchAction: 'manipulation', WebkitTouchCallout: 'none',
                                                            opacity: isFilteredOut ? 0.08 : 1,
                                                            filter: isFilteredOut ? 'grayscale(1)' : 'none',
                                                            background: isM ? masteredAccent : (isC ? color : '#4b5563'),
                                                            padding: isM ? '2px' : 0,
                                                            overflow: 'hidden',
                                                            ...endRadius
                                                        }}
                                                    >
                                                        {/* Mastered = gold trim (outer bg) + black buffer + color fill,
                                                            same three-layer treatment as the dots on the Vault page.
                                                            Each layer gets the same corner rounding so the trim
                                                            doesn't square off inside a rounded segment. */}
                                                        {isM && (
                                                            <div style={{ width: '100%', height: '100%', background: '#000', padding: '2px', boxSizing: 'border-box', overflow: 'hidden', ...endRadius }}>
                                                                <div style={{ width: '100%', height: '100%', background: color, ...endRadius }} />
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ) : (
                    <div style={{ display: 'grid', gridTemplateColumns: compactView ? 'repeat(auto-fill, minmax(170px, 1fr))' : 'repeat(auto-fill, minmax(300px, 1fr))', gap: compactView ? '0.75rem' : '1.5rem' }}>
                        {(() => {
                            const maxTileSlots = Math.ceil(Math.max(...sprites.map(sp => sp.v.length)) / 2) * 2;
                            return sprites.map(sp => {
                            const c = sp.v.filter(vv => collected.includes(sp.name + '-' + vv)).length;
                            const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                            const cardPct = sp.v.length > 0 ? (c / sp.v.length) * 100 : 0;
                            const allMastered = sp.v.length > 0 && m === sp.v.length;
                            const ringColor = allMastered ? masteredAccent : accentColor;
                            const cardShadows = [];
                            if (isMasterCollector) cardShadows.push(cardGlow);
                            if (allMastered) cardShadows.push(`0 0 16px ${masteredAccent}99`);
                            const anyVariantMatches = sp.v.some(vv => matchesFilters(vv, collected.includes(sp.name + '-' + vv), mastered.includes(sp.name + '-' + vv)));
                            if (!anyVariantMatches) return null;
                            return (
                                <div key={sp.name} style={{ background: cardBg, padding: compactView ? '0.75rem' : '1.5rem', borderRadius: '0.75rem', border: allMastered ? `2px solid ${masteredAccent}` : `1px solid ${cardBorder}`, position: 'relative', boxShadow: cardShadows.length > 0 ? cardShadows.join(', ') : 'none' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: compactView ? '0.5rem' : '1rem' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', minWidth: 0, fontSize: compactView ? '0.85rem' : '1.125rem', fontWeight: 700 }}>
                                            <span style={{ width: compactView ? '7px' : '9px', height: compactView ? '7px' : '9px', borderRadius: '50%', background: sp.color, flexShrink: 0 }} />
                                            <span style={{ overflowWrap: 'break-word' }}>{sp.name}</span>
                                        </div>
                                        <div style={{
                                            width: compactView ? '24px' : '32px', height: compactView ? '24px' : '32px',
                                            borderRadius: '50%', flexShrink: 0, position: 'relative',
                                            background: `conic-gradient(${ringColor} ${cardPct}%, ${cardBorder} ${cardPct}%)`,
                                            boxShadow: cardPct === 100 ? `0 0 6px ${ringColor}` : 'none'
                                        }}>
                                            <div style={{
                                                position: 'absolute', inset: compactView ? '3px' : '4px', borderRadius: '50%',
                                                background: cardBg, display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                fontSize: compactView ? '0.65rem' : '0.8rem', fontWeight: 800, color: textColor
                                            }}>
                                                {c}/{sp.v.length}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: compactView ? '0.4rem' : '0.75rem' }}>
                                        {sp.v.map(vv => {
                                            const id = sp.name + '-' + vv;
                                            const isC = collected.includes(id);
                                            const isM = mastered.includes(id);
                                            const isFilteredOut = !matchesFilters(vv, isC, isM);
                                            return (
                                                <div
                                                    key={vv}
                                                    onContextMenu={(e) => e.preventDefault()}
                                                    onPointerDown={(e) => handlePointerDown(e, sp.name, vv)}
                                                    onPointerUp={(e) => handlePointerUp(e, sp.name, vv)}
                                                    onPointerCancel={(e) => handlePointerCancel(e, sp.name, vv)}
                                                    onPointerLeave={(e) => handlePointerCancel(e, sp.name, vv)}
                                                    style={{
                                                        width: '100%',
                                                        height: compactView ? '62px' : '120px',
                                                        borderRadius: '0.5rem',
                                                        overflow: 'hidden',
                                                        opacity: isFilteredOut ? 0.08 : (isC ? 1 : 0.3),
                                                        filter: isFilteredOut ? 'grayscale(1)' : 'none',
                                                        cursor: 'pointer',
                                                        transition: 'all 0.3s',
                                                        background: 'rgba(0,0,0,0.1)',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        touchAction: 'manipulation',
                                                        WebkitTouchCallout: 'none'
                                                    }}
                                                >
                                                    <img 
                                                        src={getImagePath(sp.name, vv)} 
                                                        {...noCalloutImgProps}
                                                        style={{
                                                            ...noCalloutImgProps.style,
                                                            width: '90%', 
                                                            height: '90%', 
                                                            objectFit: 'contain',
                                                            filter: isM ? `drop-shadow(0 0 6px ${masteredAccent})` : 'none'
                                                        }} 
                                                        alt={vv}
                                                        onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                </div>
                                            );
                                        })}
                                        {Array.from({ length: Math.max(0, maxTileSlots - sp.v.length) }).map((_, idx) => (
                                            <div key={`placeholder-${idx}`} style={{ width: '100%', height: compactView ? '62px' : '120px', visibility: 'hidden' }} />
                                        ))}
                                    </div>
                                </div>
                            );
                        });
                        })()}
                    </div>
                    )}
                </div>
            </div>;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
