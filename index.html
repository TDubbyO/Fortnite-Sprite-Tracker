<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite RUNNERS</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif;">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const sprites = [
            { name: 'Water', color: '#3b82f6', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Earth', color: '#16a34a', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fire', color: '#ef4444', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Duck', color: '#facc15', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Ghost', color: '#cbd5e1', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Dream', color: '#a855f7', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Demon', color: '#b91c1c', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Punk', color: '#db2777', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'King', color: '#b45309', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Burnt Peanut', color: '#78350f', v: ['Base'] },
            { name: 'Zero Point', color: '#6d28d9', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Fishy', color: '#f97316', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Striker', color: '#000000', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Aura', color: '#ffffff', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Boss', color: '#dc2626', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
            { name: 'Grim', color: '#312e81', v: ['Base', 'Gold', 'Gummy', 'Galaxy'] },
        ];
 
        function App() {
            const [collected, setCollected] = useState(() => JSON.parse(localStorage.getItem('c') || '[]'));
            const [mastered, setMastered] = useState(() => JSON.parse(localStorage.getItem('m') || '[]'));
            const [share, setShare] = useState(false);
            const pr = useRef(false);
 
            useEffect(() => { localStorage.setItem('c', JSON.stringify(collected)); }, [collected]);
            useEffect(() => { localStorage.setItem('m', JSON.stringify(mastered)); }, [mastered]);
 
            const tot = sprites.reduce((s, sp) => s + sp.v.length, 0);
            const col = collected.length;
            const mas = mastered.length;
            const pct = Math.round((col / tot) * 100);
 
            const toggle = (n, v) => {
                const id = n + '-' + v;
                setCollected(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
            };
 
            const longPress = (n, v) => {
                const id = n + '-' + v;
                const c = collected.includes(id);
                const m = mastered.includes(id);
                if (!c) { setCollected(p => [...p, id]); setMastered(p => [...p, id]); }
                else if (!m) { setMastered(p => [...p, id]); }
                else { setMastered(p => p.filter(x => x !== id)); }
            };
 
            if (share) {
                return <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '2rem' }}>
                    <button onClick={() => setShare(false)} style={{ padding: '0.5rem 1rem', background: 'rgba(30,41,59,0.6)', color: '#06b6d4', border: 'none', borderRadius: '0.5rem', cursor: 'pointer' }}>← Back</button>
                    <h1 style={{ fontSize: '3rem', fontWeight: 900, margin: '1rem 0', color: '#06b6d4' }}>RUNNERS</h1>
                    <p style={{ fontSize: '0.875rem', opacity: 0.7 }}>{pct}% • {col}/{tot}</p>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '0.5rem' }}>
                        {sprites.map(sp => (
                            <div key={sp.name} style={{ background: 'rgba(30,41,59,0.4)', padding: '0.75rem', borderRadius: '0.5rem', fontSize: '0.75rem', border: '1px solid rgba(100,116,139,0.3)' }}>
                                <strong>{sp.name}</strong>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '2px', marginTop: '0.25rem' }}>
                                    {sp.v.map(vv => {
                                        const id = sp.name + '-' + vv;
                                        const cols = { Base: '#94a3b8', Gold: '#eab308', Gummy: '#ec4899', Galaxy: '#6366f1' };
                                        return <div key={vv} style={{ width: '16px', height: '16px', border: '1px solid ' + cols[vv], backgroundColor: collected.includes(id) ? cols[vv] : 'transparent' }} />;
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>;
            }
 
            return <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '2rem' }}>
                <div style={{ background: 'rgba(30,41,59,0.5)', padding: '1rem', borderRadius: '0.5rem', marginBottom: '2rem', border: '1px solid rgba(100,116,139,0.3)' }}>
                    <span style={{ color: '#06b6d4', fontWeight: 'bold' }}>Tap</span> to collect • <span style={{ color: '#fbbf24', fontWeight: 'bold' }}>long press</span> to master
                </div>
                <h1 style={{ fontSize: '3.5rem', fontWeight: 900, margin: '1rem 0', background: 'linear-gradient(90deg, #06b6d4, #a855f7, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>RUNNERS</h1>
                <button onClick={() => setShare(true)} style={{ padding: '0.75rem 1.5rem', background: 'rgba(30,41,59,0.6)', color: '#06b6d4', border: 'none', borderRadius: '0.5rem', cursor: 'pointer', marginBottom: '2rem', fontSize: '1rem' }}>↑ Screenshot</button>
                
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '2rem', marginBottom: '3rem' }}>
                    <div style={{ background: 'rgba(30,41,59,0.4)', padding: '2rem', borderRadius: '1rem', border: '1px solid rgba(100,116,139,0.3)', textAlign: 'center' }}>
                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Collected</div>
                        <div style={{ fontSize: '2rem', color: '#06b6d4', fontWeight: 'bold' }}>{col}/{tot}</div>
                    </div>
                    <div style={{ background: 'rgba(30,41,59,0.4)', padding: '2rem', borderRadius: '1rem', border: '1px solid rgba(100,116,139,0.3)', textAlign: 'center' }}>
                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Mastered</div>
                        <div style={{ fontSize: '2rem', color: '#fbbf24', fontWeight: 'bold' }}>{mas}/{tot}</div>
                    </div>
                    <div style={{ background: 'rgba(30,41,59,0.4)', padding: '2rem', borderRadius: '1rem', border: '1px solid rgba(100,116,139,0.3)', textAlign: 'center' }}>
                        <div style={{ fontSize: '1.25rem', fontWeight: 900, textTransform: 'uppercase', marginBottom: '1rem', opacity: 0.8 }}>Progress</div>
                        <div style={{ fontSize: '2rem', color: '#06b6d4', fontWeight: 'bold' }}>{pct}%</div>
                    </div>
                </div>
 
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '1.5rem' }}>
                    {sprites.map(sp => {
                        const c = sp.v.filter(vv => collected.includes(sp.name + '-' + vv)).length;
                        const m = sp.v.filter(vv => mastered.includes(sp.name + '-' + vv)).length;
                        return (
                            <div key={sp.name} style={{ background: 'rgba(30,41,59,0.4)', padding: '1.5rem', borderRadius: '0.75rem', border: '1px solid rgba(100,116,139,0.3)' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                                    <div style={{ fontSize: '1.125rem', fontWeight: 700 }}>{sp.name}</div>
                                    {m === sp.v.length && sp.v.length > 0 && <span style={{ fontSize: '1.5rem' }}>★</span>}
                                </div>
                                <div style={{ fontSize: '0.875rem', opacity: 0.7, marginBottom: '1rem' }}>{c}/{sp.v.length}</div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.75rem' }}>
                                    {sp.v.map(vv => {
                                        const id = sp.name + '-' + vv;
                                        const isC = collected.includes(id);
                                        const isM = mastered.includes(id);
                                        const cols = { Base: '#94a3b8', Gold: '#eab308', Gummy: '#ec4899', Galaxy: '#6366f1' };
                                        return (
                                            <button
                                                key={vv}
                                                style={{
                                                    padding: '0.75rem',
                                                    border: '2px solid ' + cols[vv],
                                                    borderRadius: '0.5rem',
                                                    backgroundColor: isC ? cols[vv] : 'transparent',
                                                    color: isC && (cols[vv] === '#ffffff' || cols[vv] === '#facc15' || cols[vv] === '#eab308') ? '#000' : 'white',
                                                    cursor: 'pointer',
                                                    fontWeight: 600,
                                                    opacity: isC ? 1 : 0.4,
                                                    transition: 'all 0.3s'
                                                }}
                                                onTouchStart={(e) => { pr.current = false; const t = setTimeout(() => { pr.current = true; longPress(sp.name, vv); }, 500); e.currentTarget.t = t; }}
                                                onTouchEnd={(e) => { clearTimeout(e.currentTarget.t); !pr.current && toggle(sp.name, vv); }}
                                                onClick={() => !pr.current && toggle(sp.name, vv)}
                                            >
                                                {vv}{isM ? ' ★' : ''}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>;
        }
 
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
